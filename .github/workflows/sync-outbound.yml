name: Sync outbound mirrors

# Temporary source-of-truth fan-out:
#   5DLabsInc/<repo> -> gitlab.5dlabs.ai/5dlabs/<repo>
#   5DLabsInc/<repo> -> github.com/5dlabs/<repo>
#
# The repository-owner guard intentionally makes this workflow inert when the
# file is mirrored back into the legacy 5dlabs org.

'on':
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-outbound-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.repository_owner == '5DLabsInc' && vars.SYNC_OUTBOUND == 'true' }}
    runs-on: [k8s-runner]
    timeout-minutes: 45
    env:
      GITLAB_HOST: gitlab.5dlabs.ai
      GITLAB_NAMESPACE: 5dlabs
      LEGACY_GITHUB_NAMESPACE: 5dlabs
    steps:
      - name: Push branches and tags to downstream mirrors
        shell: bash
        env:
          SOURCE_GITHUB_TOKEN: ${{ github.token }}
          GITLAB_PUSH_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
          LEGACY_GITHUB_PUSH_TOKEN: ${{ secrets.LEGACY_GITHUB_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GITLAB_PUSH_TOKEN:-}" ]]; then
            echo "::error::GITLAB_PUSH_TOKEN secret is not set"
            exit 1
          fi
          if [[ -z "${LEGACY_GITHUB_PUSH_TOKEN:-}" ]]; then
            echo "::error::LEGACY_GITHUB_PUSH_TOKEN secret is not set"
            exit 1
          fi

          repo_name="${GITHUB_REPOSITORY##*/}"
          source_remote="https://x-access-token:${SOURCE_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          gitlab_remote="https://oauth2:${GITLAB_PUSH_TOKEN}@${GITLAB_HOST}/${GITLAB_NAMESPACE}/${repo_name}.git"
          legacy_remote="https://x-access-token:${LEGACY_GITHUB_PUSH_TOKEN}@github.com/${LEGACY_GITHUB_NAMESPACE}/${repo_name}.git"

          git clone --mirror "$source_remote" repo.git
          cd repo.git
          git config http.postBuffer 157286400
          git remote add gitlab "$gitlab_remote"
          git remote add legacy "$legacy_remote"
          refs_dir="$PWD/.sync-refs"
          mkdir -p "$refs_dir"
          source_refs="$refs_dir/source-refs"

          git for-each-ref --format='%(refname)' refs/heads refs/tags | sort > "$source_refs"

          push_existing_refs() {
            local remote="$1"
            echo "::group::push existing refs to ${remote}"
            while IFS= read -r ref; do
              echo "-> ${remote} ${ref}"
              git push --force "$remote" "$ref:$ref"
            done < "$source_refs"
            echo "::endgroup::"
          }

          prune_deleted_refs() {
            local remote="$1"
            local refs_file="$refs_dir/${remote}-refs"
            echo "::group::prune deleted refs from ${remote}"
            git ls-remote --heads --tags "$remote" \
              | awk '$2 !~ /\^{}$/ { print $2 }' \
              | sort > "$refs_file"
            comm -13 "$source_refs" "$refs_file" | while IFS= read -r ref; do
              case "$ref" in
                refs/heads/*|refs/tags/*)
                  echo "delete ${remote} ${ref}"
                  git push "$remote" ":$ref"
                  ;;
              esac
            done
            echo "::endgroup::"
          }

          push_existing_refs gitlab &
          gitlab_push_pid=$!
          push_existing_refs legacy &
          legacy_push_pid=$!

          wait "$gitlab_push_pid"
          wait "$legacy_push_pid"

          prune_deleted_refs gitlab &
          gitlab_prune_pid=$!
          prune_deleted_refs legacy &
          legacy_prune_pid=$!

          wait "$gitlab_prune_pid"
          wait "$legacy_prune_pid"

          echo "Outbound sync complete for ${GITHUB_REPOSITORY}"
