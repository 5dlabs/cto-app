name: Sync outbound mirrors

# Temporary source-of-truth fan-out with explicit repo mapping:
#   5DLabsInc/cto     -> gitlab.5dlabs.ai/5dlabs/cto     + github.com/5dlabs/cto
#   5DLabsInc/cto-app -> gitlab.5dlabs.ai/5dlabs/cto-app + github.com/5dlabs/cto-app
#
# The repository-owner guard intentionally makes this workflow inert when the
# file is mirrored back into the legacy 5dlabs org.

'on':
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-outbound-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.repository_owner == '5DLabsInc' && vars.SYNC_OUTBOUND == 'true' }}
    runs-on: [k8s-runner]
    timeout-minutes: 45
    env:
      GITLAB_HOST: gitlab-gitlab-shell.gitlab.svc.cluster.local.
      GITLAB_SSH_PORT: '22'
      GITLAB_SSH_USER: git
      GITLAB_NAMESPACE: 5dlabs
      LEGACY_GITHUB_NAMESPACE: 5dlabs
    steps:
      - name: Push branches and tags to downstream mirrors
        shell: bash
        env:
          SOURCE_GITHUB_TOKEN: ${{ github.token }}
          GITLAB_PUSH_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
          GITLAB_SSH_PRIVATE_KEY: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          LEGACY_GITHUB_PUSH_TOKEN: ${{ secrets.LEGACY_GITHUB_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GITLAB_PUSH_TOKEN:-}" && -z "${GITLAB_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::GITLAB_PUSH_TOKEN or GITLAB_SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [[ -z "${LEGACY_GITHUB_PUSH_TOKEN:-}" ]]; then
            echo "::error::LEGACY_GITHUB_PUSH_TOKEN secret is not set"
            exit 1
          fi

          case "${GITHUB_REPOSITORY}" in
            5DLabsInc/cto)
              repo_name="cto"
              ;;
            5DLabsInc/cto-app)
              repo_name="cto-app"
              ;;
            *)
              echo "::error::No outbound mirror mapping for ${GITHUB_REPOSITORY}"
              exit 1
              ;;
          esac

          source_remote="https://x-access-token:${SOURCE_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          legacy_remote="https://x-access-token:${LEGACY_GITHUB_PUSH_TOKEN}@github.com/${LEGACY_GITHUB_NAMESPACE}/${repo_name}.git"

          if [[ -n "${GITLAB_SSH_PRIVATE_KEY:-}" ]]; then
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "$GITLAB_SSH_PRIVATE_KEY" > ~/.ssh/gitlab_mirror_key
            chmod 600 ~/.ssh/gitlab_mirror_key
            ssh-keyscan -p "$GITLAB_SSH_PORT" -H "$GITLAB_HOST" >> ~/.ssh/known_hosts
            gitlab_remote="ssh://${GITLAB_SSH_USER}@${GITLAB_HOST}:${GITLAB_SSH_PORT}/${GITLAB_NAMESPACE}/${repo_name}.git"
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/gitlab_mirror_key -o IdentitiesOnly=yes"
          else
            gitlab_remote="https://oauth2:${GITLAB_PUSH_TOKEN}@${GITLAB_HOST}/${GITLAB_NAMESPACE}/${repo_name}.git"
          fi

          git clone --mirror "$source_remote" repo.git
          cd repo.git
          git config http.postBuffer 157286400
          git remote add gitlab "$gitlab_remote"
          git remote add legacy "$legacy_remote"

          mirror_heads_and_tags() {
            local remote="$1"
            local max_attempts=6
            echo "::group::mirror heads and tags to ${remote}"
            for ((attempt = 1; attempt <= max_attempts; attempt++)); do
              if git push --prune --force "$remote" 'refs/heads/*:refs/heads/*' 'refs/tags/*:refs/tags/*'; then
                echo "::endgroup::"
                return 0
              fi
              echo "::warning::mirror push to ${remote} failed on attempt ${attempt}"
              if [[ "$attempt" -lt "$max_attempts" ]]; then
                sleep $((attempt * 10))
              fi
            done
            echo "::endgroup::"
            return 1
          }

          mirror_heads_and_tags gitlab
          mirror_heads_and_tags legacy

          echo "Outbound sync complete for ${GITHUB_REPOSITORY} -> ${LEGACY_GITHUB_NAMESPACE}/${repo_name}"
