name: Tauri E2E

on:
  workflow_dispatch:
    inputs:
      start_bootstrap:
        description: "Click Start and run the real Kind/GitOps bootstrap"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      reset:
        description: "Use the dev reset control before cycling the setup"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    paths:
      - ".github/workflows/tauri-e2e.yml"
      - "e2e/**"
      - "scripts/e2e/**"
      - "src-tauri/**"
      - "ui/**"
      - "package.json"
      - "package-lock.json"

jobs:
  selenium:
    name: Selenium / Tauri WebDriver
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CTO_E2E_START_BOOTSTRAP: ${{ github.event_name == 'workflow_dispatch' && inputs.start_bootstrap == 'true' && '1' || '0' }}
      CTO_E2E_RESET: ${{ github.event_name == 'workflow_dispatch' && inputs.reset == 'true' && '1' || '0' }}
      CTO_E2E_GITHUB_OWNER: ${{ vars.CTO_E2E_GITHUB_OWNER }}
      CTO_E2E_GITHUB_PAT: ${{ secrets.CTO_E2E_GITHUB_PAT }}
      VITE_CTO_MORGAN_AUTOSTART: "0"
      VITE_CTO_FORCE_LOCAL_STACK_BOOTSTRAP: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri WebDriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libasound2-dev \
            webkit2gtk-4.1 \
            webkit2gtk-driver \
            xvfb

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Run Tauri Selenium E2E
        run: xvfb-run -a npm run e2e:tauri

      - name: Run Kubernetes smoke validation
        if: env.CTO_E2E_START_BOOTSTRAP == '1'
        run: npm run e2e:k8s-smoke -- --watch

      - name: Upload bootstrap run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-run-logs
          path: .local/bootstrap-runs
          if-no-files-found: ignore
