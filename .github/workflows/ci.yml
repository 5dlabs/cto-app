name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace deps
        run: npm ci --workspaces --include-workspace-root

      - name: Typecheck
        run: npm --workspace ui run typecheck

      - name: Assert local Morgan URLs
        run: |
          if grep -R -nE 'morgan-(ide|project-api|voice)\.5dlabs\.ai' ui/src; then
            echo "Morgan desktop defaults must use localhost ingress paths" >&2
            exit 1
          fi

      - name: Build UI
        run: npm --workspace ui run build

  ci-tools:
    name: CI tools fmt + test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --manifest-path crates/ci-tools/Cargo.toml --all -- --check

      - name: cargo test
        run: cargo test --manifest-path crates/ci-tools/Cargo.toml

      - name: cargo clippy (pedantic)
        run: cargo clippy --manifest-path crates/ci-tools/Cargo.toml --all-targets -- -W clippy::pedantic -D warnings

  rust:
    name: Rust fmt + clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (pedantic)
        run: cargo clippy --all-targets -- -W clippy::pedantic -D warnings
