name: publish-chart

# Publishes the CTO Helm charts to two OCI registries:
#   - ghcr.io/<lowercase-owner>   (public; primary for desktop bootstrap)
#   - registry.gitlab.com/... OR self-hosted gitlab.5dlabs.ai (mirror)
#
# Runs when chart source lands on main, on explicit chart-v* tags, or by manual
# dispatch. Existing OCI chart versions are immutable and skipped.

on:
  push:
    branches: [main]
    tags: ["chart-v*"]
    paths:
      - ".gitops/charts/**"
      - ".github/workflows/publish-chart.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || github.repository_owner }}
  GITLAB_REGISTRY: ${{ vars.GITLAB_REGISTRY || 'registry.gitlab.com' }}
  GITLAB_HELM_PATH: ${{ vars.GITLAB_HELM_PATH }}

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Exposing secrets via env lets us reference them in step `if:`
      # conditions (GitHub Actions doesn't allow `secrets.*` in step ifs).
      GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
      GHCR_PUSH_TOKEN: ${{ secrets.LEGACY_GITHUB_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
      GHCR_PUSH_USER: ${{ vars.LEGACY_GITHUB_PACKAGES_USER || github.actor }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve GHCR namespace
        id: ghcr
        shell: bash
        run: |
          set -euo pipefail
          namespace="${GHCR_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}}"
          namespace="$(printf '%s' "${namespace}" | tr '[:upper:]' '[:lower:]')"
          if ! [[ "${namespace}" =~ ^[a-z0-9][a-z0-9._-]*$ ]]; then
            echo "Invalid GHCR namespace: ${namespace}" >&2
            exit 1
          fi
          echo "namespace=${namespace}" >> "${GITHUB_OUTPUT}"
          echo "Using GHCR namespace: ${namespace}"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint charts
        run: |
          for chart in .gitops/charts/*/; do
            [ -f "$chart/Chart.yaml" ] || continue
            echo "::group::helm lint $chart"
            helm lint "$chart"
            echo "::endgroup::"
          done

      - name: Package charts
        run: |
          mkdir -p dist
          for chart in .gitops/charts/*/; do
            [ -f "$chart/Chart.yaml" ] || continue
            helm package "$chart" --destination dist
          done
          ls -la dist/

      - name: Login to GHCR
        run: |
          echo "${GHCR_PUSH_TOKEN}" \
            | helm registry login "${GHCR_REGISTRY}" \
              --username "${GHCR_PUSH_USER}" \
              --password-stdin

      - name: Push to GHCR (public)
        env:
          GHCR_NAMESPACE_RESOLVED: ${{ steps.ghcr.outputs.namespace }}
        run: |
          set -euo pipefail
          repo="oci://${GHCR_REGISTRY}/${GHCR_NAMESPACE_RESOLVED}/helm-charts"
          for pkg in dist/*.tgz; do
            chart_name="$(helm show chart "$pkg" | awk '/^name:/ {print $2; exit}')"
            chart_version="$(helm show chart "$pkg" | awk '/^version:/ {print $2; exit}')"
            if helm show chart "${repo}/${chart_name}" --version "${chart_version}" >/dev/null 2>&1; then
              echo "Already published: ${repo}/${chart_name}:${chart_version}; skipping immutable OCI version."
              continue
            fi
            echo "Pushing $pkg -> ${repo}"
            helm push "$pkg" "${repo}"
          done

      - name: Login to GitLab registry
        if: ${{ env.GITLAB_HELM_PATH != '' && env.GITLAB_DEPLOY_TOKEN != '' }}
        run: |
          echo "${GITLAB_DEPLOY_TOKEN}" \
            | helm registry login "${GITLAB_REGISTRY}" \
              --username "${{ vars.GITLAB_DEPLOY_USER }}" \
              --password-stdin

      - name: Push to GitLab (mirror)
        if: ${{ env.GITLAB_HELM_PATH != '' && env.GITLAB_DEPLOY_TOKEN != '' }}
        run: |
          set -euo pipefail
          for pkg in dist/*.tgz; do
            repo="oci://${GITLAB_REGISTRY}/${GITLAB_HELM_PATH}"
            chart_name="$(helm show chart "$pkg" | awk '/^name:/ {print $2; exit}')"
            chart_version="$(helm show chart "$pkg" | awk '/^version:/ {print $2; exit}')"
            if helm show chart "${repo}/${chart_name}" --version "${chart_version}" >/dev/null 2>&1; then
              echo "Already published: ${repo}/${chart_name}:${chart_version}; skipping immutable OCI version."
              continue
            fi
            helm push "$pkg" "${repo}"
          done

      - name: Verify GHCR chart packages are public
        env:
          GHCR_NAMESPACE_RESOLVED: ${{ steps.ghcr.outputs.namespace }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT
          export HOME="${tmp}"
          export HELM_REGISTRY_CONFIG="${tmp}/registry.json"
          export HELM_REPOSITORY_CONFIG="${tmp}/repositories.yaml"
          export HELM_REPOSITORY_CACHE="${tmp}/cache"
          repo="oci://${GHCR_REGISTRY}/${GHCR_NAMESPACE_RESOLVED}/helm-charts"
          expected_source="https://github.com/${GITHUB_REPOSITORY}"
          for pkg in dist/*.tgz; do
            chart_name="$(helm show chart "$pkg" | awk '/^name:/ {print $2; exit}')"
            chart_version="$(helm show chart "$pkg" | awk '/^version:/ {print $2; exit}')"
            echo "Verifying anonymous Helm pull: ${repo}/${chart_name}:${chart_version}"
            chart_metadata="$(helm show chart "${repo}/${chart_name}" --version "${chart_version}")"
            grep -F "${expected_source}" <<<"${chart_metadata}" >/dev/null
          done

      # NOTE: GitHub's documented package APIs do not expose a reliable
      # visibility mutation for container packages. Existing CTO chart packages
      # must be public for zero-auth desktop bootstrap; this workflow verifies
      # that contract with a clean Helm registry config.
