name: Smoke Test (Chart)

# Smoke test for the published cto chart:
#   1. Pull the chart fresh from OCI.
#   2. Install into a fresh kind cluster with tools disabled.
#   3. Verify the controller is Available.
#   4. Verify the CodeRun CRD is established and accepts a CodeRun object.
#
# Each job pulls the chart fresh from OCI (no helm cache reuse).
# Triggered automatically after "Publish Charts" succeeds on main, or
# manually via workflow_dispatch.

on:
  workflow_run:
    workflows: ["publish-chart"]
    types: [completed]
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Chart version to pull from OCI (default: read from Chart.yaml)'
        required: false
        default: ''

permissions:
  contents: read
  packages: read

concurrency:
  group: smoke-test-chart
  cancel-in-progress: false

env:
  CHART_REPO: oci://ghcr.io/5dlabs/helm-charts/cto
  NS: cto-system
  KIND_VERSION: v0.23.0
  K8S_VERSION: v1.30.0

jobs:
  # Skip if triggered by a failed publish run
  gate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: |
          V="${{ github.event.inputs.chart_version }}"
          if [ -z "$V" ]; then
            V=$(awk '/^version:/ {print $2; exit}' .gitops/charts/cto/Chart.yaml)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Chart version: $V"

  smoke-chart:
    name: smoke / chart + controller + CRD
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kind, kubectl, helm
        run: |
          set -eu
          curl -fsSL -o /tmp/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/${K8S_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create kind cluster
        run: |
          kind delete cluster --name cto-smoke-ctl || true
          kind create cluster --name cto-smoke-ctl --image "kindest/node:${K8S_VERSION}" --wait 120s
          kubectl get nodes -o wide

      - name: Log in to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull chart fresh from OCI (no cache)
        run: |
          set -eu
          D=$(mktemp -d)
          export HELM_CACHE_HOME="$D/cache" HELM_CONFIG_HOME="$D/config" HELM_DATA_HOME="$D/data"
          mkdir -p "$HELM_CACHE_HOME" "$HELM_CONFIG_HOME" "$HELM_DATA_HOME" /tmp/chart
          helm pull "$CHART_REPO" --version "${{ needs.gate.outputs.chart_version }}" --destination /tmp/chart
          ls -la /tmp/chart

      - name: Install chart (controller only)
        run: |
          # The published chart includes a Namespace resource. Pre-create it
          # with Helm ownership metadata so Helm can store release state before
          # rendering and then adopt the Namespace from the chart.
          kubectl create namespace "$NS"
          kubectl label namespace "$NS" \
            app.kubernetes.io/managed-by=Helm \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/audit=privileged \
            pod-security.kubernetes.io/warn=privileged \
            --overwrite
          kubectl annotate namespace "$NS" \
            meta.helm.sh/release-name=cto \
            meta.helm.sh/release-namespace="$NS" \
            --overwrite
          helm install cto "/tmp/chart/cto-${{ needs.gate.outputs.chart_version }}.tgz" \
            --namespace "$NS" \
            --set tools.enabled=false \
            --set controller.skillsCache.enabled=false \
            --wait --timeout=6m
          kubectl -n "$NS" get deploy,pod -o wide

      - name: Verify controller Deployment Available
        run: |
          set -eu
          DEP=$(kubectl -n "$NS" get deploy -l app.kubernetes.io/name=controller -o name | head -1)
          if [ -z "$DEP" ]; then
            echo "No controller deployment found" >&2
            kubectl -n "$NS" get all
            exit 1
          fi
          kubectl -n "$NS" wait "$DEP" --for=condition=Available --timeout=3m
          echo "✅ controller up"

      - name: Verify CodeRun CRD and API
        run: |
          set -eu
          kubectl wait --for=condition=Established crd/coderuns.agents.platform --timeout=90s
          kubectl api-resources --api-group=agents.platform
          kubectl -n "$NS" apply -f - <<'YAML'
          apiVersion: agents.platform/v1
          kind: CodeRun
          metadata:
            name: smoke-coderun
          spec:
            runType: documentation
            service: smoke
            repositoryUrl: https://github.com/5dlabs/cto-app
            docsRepositoryUrl: https://github.com/5dlabs/cto-app
            workingDirectory: .
            githubApp: smoke-test
          YAML
          kubectl -n "$NS" get coderun smoke-coderun -o jsonpath='{.spec.service}{"\n"}'
          echo "✅ CodeRun CRD accepts objects"

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl -n "$NS" get events --sort-by=.lastTimestamp | tail -60 || true
          kubectl -n "$NS" get pods -o wide || true
          kubectl get crd coderuns.agents.platform -o yaml || true
          kubectl -n "$NS" get coderuns -o yaml || true
          kubectl -n "$NS" describe deploy -l app.kubernetes.io/name=controller || true
          kubectl -n "$NS" logs -l app.kubernetes.io/name=controller,app.kubernetes.io/instance=cto --tail=200 --all-containers || true

      - name: Uninstall
        if: always()
        run: |
          helm uninstall cto -n "$NS" --wait || true
          kubectl delete ns "$NS" --wait=false || true

      - name: Teardown kind
        if: always()
        run: kind delete cluster --name cto-smoke-ctl || true
