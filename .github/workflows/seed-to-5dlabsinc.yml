name: Seed to 5DLabsInc

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-to-5dlabsinc-${{ github.repository }}
  cancel-in-progress: false

jobs:
  seed:
    if: ${{ github.repository_owner == '5dlabs' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mirror this legacy repo to 5DLabsInc
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_ORG_PUSH_TOKEN: ${{ secrets.NEW_ORG_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NEW_ORG_PUSH_TOKEN:-}" ]]; then
            echo "::error::NEW_ORG_PUSH_TOKEN secret is not set"
            exit 1
          fi
          repo_name="${GITHUB_REPOSITORY##*/}"
          git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git
          cd repo.git
          git remote add neworg "https://x-access-token:${NEW_ORG_PUSH_TOKEN}@github.com/5DLabsInc/${repo_name}.git"
          git push --mirror neworg