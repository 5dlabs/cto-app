{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-prometheus
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yaml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:{{ .Values.prometheus.service.port }}

      {{- if .Values.loki.enabled }}
      - job_name: loki
        static_configs:
          - targets:
              - {{ include "observability.fullname" . }}-loki:{{ .Values.loki.service.port }}
      {{- end }}

      {{- if .Values.grafana.enabled }}
      - job_name: grafana
        static_configs:
          - targets:
              - {{ include "observability.fullname" . }}-grafana:{{ .Values.grafana.service.port }}
      {{- end }}
{{- end }}
