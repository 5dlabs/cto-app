---
namespace: cto-system
createNamespace: false

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

podLabels: {}

loki:
  enabled: true
  image:
    repository: grafana/loki
    tag: "3.4.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3100
    grpcPort: 9095
    annotations: {}
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""
    annotations: {}
  retention: 168h
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
  nodeSelector: {}
  tolerations: []
  affinity: {}

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.55.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
    annotations: {}
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    storageClassName: ""
    annotations: {}
  retention: 24h
  scrapeInterval: 30s
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Grafana is exposed only on the local kind ingress host. Anonymous admin is
# acceptable for localhost-only desktop diagnostics and avoids secret bootstrap.
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "11.5.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    annotations: {}
  ingress:
    enabled: true
    className: nginx
    host: localhost
    path: /grafana(/|$)(.*)
    pathType: ImplementationSpecific
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    tls: []
  rootUrl: http://localhost:8080/grafana
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "true"
    GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    GF_AUTH_DISABLE_LOGIN_FORM: "true"
    GF_ANALYTICS_REPORTING_ENABLED: "false"
    GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    GF_METRICS_ENABLED: "true"
    GF_LOG_MODE: console
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 472
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Promtail is scoped to cto-system pod stdout/stderr logs and only renders when
# Loki is enabled in this same chart, so Morgan never depends on Loki by default.
promtail:
  enabled: true
  image:
    repository: grafana/promtail
    tag: "3.4.2"
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsUser: 0
  nodeSelector: {}
  tolerations:
    - operator: Exists
  affinity: {}
