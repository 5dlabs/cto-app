# ClusterRole granting agent pods full admin access to the cluster.
# Equivalent to the built-in cluster-admin role: all API groups, all resources,
# all verbs, plus all non-resource URLs. This lets agents manage Kubernetes
# resources, ArgoCD apps, CRDs, monitoring stacks, autoscaling, Flux/Helm
# resources, and anything else installed in the cluster without needing to
# enumerate API groups here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent.fullname" . }}
    namespace: {{ .Values.namespace | default .Release.Namespace }}
