# =============================================================================
# CTO Service Manager (shell-based, no systemd required)
# =============================================================================
# Provides a lightweight service manager for CTO development services inside
# agent pods. Mirrors the macOS launchd setup (scripts/launchd-setup.sh) but
# uses background processes + PID files instead of systemd (which requires
# privileges not available in unprivileged containers).
#
# Services:
#   controller  - agent-controller (port 8080)
#   pm-server   - pm-server (port 8081)
#   healer      - healer server (port 8082)
#   watcher     - inotifywait-based file watcher for auto-restart
#
# Usage:
#   cto-services start all|<service>
#   cto-services stop all|<service>
#   cto-services restart all|<service>
#   cto-services status
#   cto-services logs <service>
#   cto-services watch
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.fullname" . }}-cto-services
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: cto-services
data:
  cto-services.sh: |
    #!/bin/bash
    # =============================================================================
    # cto-services — Lightweight service manager for CTO dev services
    # Linux equivalent of macOS launchd services (scripts/launchd-setup.sh)
    # =============================================================================
    set -euo pipefail

    # Directories
    CTO_DIR="${CTO_PROJECT_DIR:-/workspace/repos/cto}"
    PID_DIR="${CTO_PID_DIR:-/workspace/.cto-services/pids}"
    LOG_DIR="${CTO_LOG_DIR:-/workspace/.cto-services/logs}"
    BIN_DIR="${CTO_BIN_DIR:-$CTO_DIR/target/release}"

    mkdir -p "$PID_DIR" "$LOG_DIR"

    # Service definitions: name:binary:port:extra_args
    declare -A SERVICES=(
      [controller]="agent-controller:8080:"
      [pm-server]="pm-server:8081:"
      [healer]="healer:8082:server --addr 0.0.0.0:8082"
    )

    # Environment variables matching launchd setup
    export RUST_LOG="${RUST_LOG:-info}"
    export AGENT_TEMPLATES_PATH="${AGENT_TEMPLATES_PATH:-$CTO_DIR/templates}"
    export HEALER_TEMPLATES_DIR="${HEALER_TEMPLATES_DIR:-$CTO_DIR/templates/healer}"
    export CTO_CONFIG_PATH="${CTO_CONFIG_PATH:-$CTO_DIR/cto-config.json}"
    export CONTROLLER_CONFIG_PATH="${CONTROLLER_CONFIG_PATH:-$CTO_DIR/config/controller-config.yaml}"
    export SERVER_HOST="${SERVER_HOST:-0.0.0.0}"

    # Colors
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    CYAN='\033[0;36m'
    NC='\033[0m'

    log_info()  { echo -e "${GREEN}[INFO]${NC} $1"; }
    log_warn()  { echo -e "${YELLOW}[WARN]${NC} $1"; }
    log_error() { echo -e "${RED}[ERROR]${NC} $1"; }

    get_pid() {
      local name="$1"
      local pidfile="$PID_DIR/$name.pid"
      if [ -f "$pidfile" ]; then
        local pid
        pid=$(cat "$pidfile")
        if kill -0 "$pid" 2>/dev/null; then
          echo "$pid"
          return 0
        fi
        rm -f "$pidfile"
      fi
      return 1
    }

    start_service() {
      local name="$1"
      if ! [[ "${SERVICES[$name]+_}" ]]; then
        log_error "Unknown service: $name"
        echo "Available: ${!SERVICES[*]} | all"
        return 1
      fi

      if get_pid "$name" >/dev/null 2>&1; then
        log_warn "$name is already running (PID $(get_pid "$name"))"
        return 0
      fi

      IFS=':' read -r binary port extra_args <<< "${SERVICES[$name]}"
      local bin_path="$BIN_DIR/$binary"

      if [ ! -x "$bin_path" ]; then
        log_error "Binary not found: $bin_path"
        log_error "Build with: cd $CTO_DIR && cargo build --release --bin $binary"
        return 1
      fi

      local env_args=""
      if [ "$name" = "controller" ]; then
        env_args="SERVER_PORT=$port"
      fi

      log_info "Starting $name ($binary on port $port)..."
      if [ -n "$extra_args" ]; then
        env $env_args "$bin_path" $extra_args \
          > "$LOG_DIR/$name.log" 2> "$LOG_DIR/$name.err" &
      else
        env $env_args "$bin_path" \
          > "$LOG_DIR/$name.log" 2> "$LOG_DIR/$name.err" &
      fi

      local pid=$!
      echo "$pid" > "$PID_DIR/$name.pid"
      log_info "$name started (PID $pid)"
    }

    stop_service() {
      local name="$1"
      if ! [[ "${SERVICES[$name]+_}" ]] && [ "$name" != "watcher" ]; then
        log_error "Unknown service: $name"
        return 1
      fi

      local pid
      if pid=$(get_pid "$name"); then
        log_info "Stopping $name (PID $pid)..."
        kill "$pid" 2>/dev/null || true
        # Wait up to 5s for graceful shutdown
        for i in $(seq 1 10); do
          if ! kill -0 "$pid" 2>/dev/null; then break; fi
          sleep 0.5
        done
        # Force kill if still running
        if kill -0 "$pid" 2>/dev/null; then
          kill -9 "$pid" 2>/dev/null || true
        fi
        rm -f "$PID_DIR/$name.pid"
        log_info "$name stopped"
      else
        log_warn "$name is not running"
      fi
    }

    restart_service() {
      local name="$1"
      stop_service "$name"
      sleep 0.5
      start_service "$name"
    }

    start_all() {
      for name in "${!SERVICES[@]}"; do
        start_service "$name"
      done
    }

    stop_all() {
      stop_service "watcher" 2>/dev/null || true
      for name in "${!SERVICES[@]}"; do
        stop_service "$name"
      done
    }

    restart_all() {
      stop_all
      sleep 1
      start_all
    }

    show_status() {
      printf "${CYAN}%-15s %-10s %-8s %-8s %s${NC}\n" "SERVICE" "STATUS" "PID" "PORT" "HEALTH"
      echo "────────────────────────────────────────────────────────────"

      for name in controller pm-server healer watcher; do
        local pid="-" status port="-" health="-"

        if [ "$name" = "watcher" ]; then
          port="-"
        else
          IFS=':' read -r _ port _ <<< "${SERVICES[$name]}"
        fi

        if pid=$(get_pid "$name" 2>/dev/null); then
          status="${GREEN}running${NC}"
          if [ "$port" != "-" ] && [ "$port" != "0" ]; then
            if curl -sf "http://localhost:$port/health" --max-time 2 >/dev/null 2>&1; then
              health="${GREEN}healthy${NC}"
            else
              health="${YELLOW}unknown${NC}"
            fi
          fi
        else
          status="${RED}stopped${NC}"
          pid="-"
        fi

        printf "%-15s %-20b %-8s %-8s %b\n" "$name" "$status" "$pid" "$port" "$health"
      done

      echo ""
      echo "Logs: $LOG_DIR/"
    }

    show_logs() {
      local name="$1"
      local logfile="$LOG_DIR/$name.log"
      local errfile="$LOG_DIR/$name.err"

      if [ -f "$logfile" ] || [ -f "$errfile" ]; then
        tail -f "$logfile" "$errfile" 2>/dev/null
      else
        log_warn "No logs found for $name"
      fi
    }

    run_watcher() {
      local watch_dir="$BIN_DIR"
      log_info "Watching $watch_dir for binary changes..."
      log_info "Services will auto-restart when binaries are rebuilt"

      if ! command -v inotifywait &>/dev/null; then
        log_error "inotifywait not found. Install inotify-tools."
        return 1
      fi

      echo $$ > "$PID_DIR/watcher.pid"

      while true; do
        inotifywait -q -e close_write -e moved_to "$watch_dir" 2>/dev/null | while read -r dir event file; do
          for name in "${!SERVICES[@]}"; do
            IFS=':' read -r binary _ _ <<< "${SERVICES[$name]}"
            if [ "$file" = "$binary" ]; then
              log_info "Detected change in $binary — restarting $name..."
              restart_service "$name"
            fi
          done
        done
        # If inotifywait exits, wait before retrying
        sleep 2
      done
    }

    # Main dispatch
    cmd="${1:-help}"
    target="${2:-}"

    case "$cmd" in
      start)
        if [ "$target" = "all" ] || [ -z "$target" ]; then
          start_all
        else
          start_service "$target"
        fi
        ;;
      stop)
        if [ "$target" = "all" ] || [ -z "$target" ]; then
          stop_all
        else
          stop_service "$target"
        fi
        ;;
      restart)
        if [ "$target" = "all" ] || [ -z "$target" ]; then
          restart_all
        else
          restart_service "$target"
        fi
        ;;
      status)
        show_status
        ;;
      logs)
        if [ -z "$target" ]; then
          log_error "Usage: cto-services logs <service>"
          exit 1
        fi
        show_logs "$target"
        ;;
      watch)
        run_watcher
        ;;
      help|--help|-h|*)
        echo "Usage: cto-services <command> [service]"
        echo ""
        echo "Commands:"
        echo "  start [all|<service>]    Start services"
        echo "  stop [all|<service>]     Stop services"
        echo "  restart [all|<service>]  Restart services"
        echo "  status                   Show service status"
        echo "  logs <service>           Tail service logs"
        echo "  watch                    File watcher for auto-restart"
        echo ""
        echo "Services: controller, pm-server, healer"
        echo ""
        echo "Environment:"
        echo "  CTO_PROJECT_DIR  CTO repo path (default: /workspace/repos/cto)"
        echo "  CTO_BIN_DIR      Binary dir (default: \$CTO_PROJECT_DIR/target/release)"
        echo "  CTO_LOG_DIR      Log dir (default: /workspace/.cto-services/logs)"
        echo "  RUST_LOG         Log level (default: info)"
        ;;
    esac
