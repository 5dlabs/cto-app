{{- if .Values.telemetry.enabled }}
# =============================================================================
# Promtail Sidecar Configuration
# =============================================================================
# Ships OpenClaw JSON-line logs from the workspace PVC to Loki.
# Log files are written by the OpenClaw gateway to the path configured
# in logging.file (values.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.fullname" . }}-promtail
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry
data:
  promtail.yaml: |
    server:
      http_listen_port: 0
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: {{ .Values.telemetry.promtail.lokiUrl }}
    scrape_configs:
      - job_name: openclaw-gateway
        static_configs:
          - targets:
              - localhost
            labels:
              job: openclaw-gateway
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              __path__: {{ .Values.logging.file | dir }}/*.log
        pipeline_stages:
          - json:
              expressions:
                level: level
                timestamp: timestamp
                source: source
                component: component
          - labels:
              level:
          - regex:
              expression: '"source"\s*:\s*"acp-(?P<cli_name>[^"]+)"'
          - labels:
              cli_name:
          - regex:
              expression: '"component"\s*:\s*"(?P<component_raw>[^"]+)"'
          - template:
              source: session_type
              template: '{{`{{ if eq .component_raw "agent/embedded" }}native{{ else if contains "acp" .source }}acp{{ else }}openclaw{{ end }}`}}'
          - labels:
              session_type:
          - json:
              expressions:
                type: type
          - labels:
              activity_type: type
          - timestamp:
              source: timestamp
              format: RFC3339Nano
      - job_name: acp-cli
        static_configs:
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-opencode
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.local/share/opencode/log/*.log
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-claude
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.claude/logs/*.log
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-codex
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.codex/logs/*.log
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-droid
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.factory/logs/*.log
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-gemini
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.gemini/tmp/*.log
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-kimi
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.kimi/logs/*.log
          - targets:
              - localhost
            labels:
              job: acp-cli
              source: acp-cursor
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              service_name: acp-cli
              __path__: /workspace/.cursor/logs/*.log
        pipeline_stages:
          - regex:
              expression: '(?P<cli_name>acp-[a-z]+)'
              source: source
          - labels:
              cli_name:
              source:
              session_type:
{{- end }}

