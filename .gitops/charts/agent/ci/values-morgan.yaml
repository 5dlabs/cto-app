---
# =============================================================================
# Morgan Agent Values — CTO desktop/local bootstrap
# =============================================================================
# Morgan is the always-up local OpenClaw gateway/agent for cto-app. Keep this
# overlay self-contained and free of server-only dependencies; the Morgan Argo
# Application consumes this file from the published agent chart package.
# =============================================================================

namespace: cto-system

global:
  namespace: cto-system
  createNamespace: false

# Public/free desktop installs do not ship Datadog. Keep Datadog pod annotations
# out of the rendered Morgan manifests.
datadog:
  enabled: false

# Verbose, stdout/stderr-friendly OpenClaw diagnostics for local support.
logging:
  level: "debug"
  file: "/workspace/.openclaw/logs/openclaw.log"
  consoleLevel: "debug"
  rawStream: true
  rawStreamPath: "/workspace/.openclaw/logs/raw-stream.jsonl"

diagnostics:
  enabled: true
  flags:
    - "acp.*"
    - "gateway.session"
    - "session.*"

replicaCount: 1
deploymentMode: statefulset

image:
  repository: "ghcr.io/5dlabs/agents"
  tag: "latest"
  pullPolicy: IfNotPresent

# The desktop bootstrap must not require a private pull secret for public images.
imagePullSecrets: []

nodeSelector: {}
tolerations: []

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    memory: "4Gi"

storage:
  size: 10Gi
  storageClass: "local-path"

agent:
  id: "morgan"
  name: "Morgan"
  model: "google/gemini-2.5-flash"
  heartbeat:
    every: "12h"
    target: "last"
    ackMaxChars: 120
    prompt: >-
      If there is no active user request, reply HEARTBEAT_OK and do nothing
      else. Do not start background work or new tasks on your own.
  sandbox: "off"
  skipGlobalSkills: false
  tools:
    allow: []

agentDefaults:
  thinkingDefault: "low"
  typingMode: "instant"
  compaction:
    mode: "safeguard"
    reserveTokensFloor: 25000
    notifyUser: true
    identifierPolicy: "strict"
    memoryFlush:
      enabled: true
      softThresholdTokens: 8000
      prompt: >-
        Before this conversation is compacted, write durable notes to
        memory/YYYY-MM-DD.md. Include active tasks, decisions, code/config
        changes, blockers, and important user preferences. If nothing meaningful
        should persist, reply NO_REPLY.
  contextPruning:
    mode: "cache-ttl"
    ttl: "5m"
  elevatedDefault: "full"
  maxConcurrent: 4
  heartbeat:
    every: "12h"
    target: "last"
    ackMaxChars: 120
    prompt: >-
      If there is no active user request, reply HEARTBEAT_OK and do nothing
      else. Do not start background work or new tasks on your own.

modelDefaults:
  primary: "google/gemini-2.5-flash"
  fallbacks:
    - "anthropic/claude-sonnet-4-20250514"
    - "openai-api/gpt-5.4"
    - "openai-api/gpt-5.3-codex"
    - "anthropic/claude-opus-4-6-20260201"

secrets:
  # Created by the cto chart in the same local namespace.
  apiKeysSecret: "cto-agent-keys"
  # cto-agent-keys renders provider/tool keys with environment-style names.
  # Keep Morgan on that local desktop secret instead of upstream lowercase keys.
  apiKeyNames:
    anthropic: "ANTHROPIC_API_KEY"
    brave: "BRAVE_API_KEY"
    doInference: "DO_INFERENCE_KEY"
    factory: "FACTORY_API_KEY"
    firecrawl: "FIRECRAWL_API_KEY"
    fireworks: "FIREWORKS_API_KEY"
    gemini: "GEMINI_API_KEY"
    github: "GITHUB_TOKEN"
    google: "GOOGLE_API_KEY"
    openai: "OPENAI_API_KEY"
  # Discord is disabled for local bootstrap; this is retained only for explicit
  # opt-in overlays that add a Discord token secret later.
  discordTokensSecret: "openclaw-discord-tokens"

# Local cto-app talks to Morgan through the in-cluster gateway/API, not Discord.
discord:
  enabled: false

messaging:
  discord:
    enabled: false

models:
  providers:
    google:
      enabled: true
      api: "google-generative-ai"
      baseUrl: "https://generativelanguage.googleapis.com/v1beta"
      apiKeySecretKey: "GEMINI_API_KEY"
      models:
        - id: "gemini-2.5-flash"
          name: "Gemini 2.5 Flash"
        - id: "gemini-2.5-pro"
          name: "Gemini 2.5 Pro"
    anthropic:
      enabled: true
      apiKeySecretKey: "ANTHROPIC_API_KEY"
    openai:
      enabled: true
      apiKeySecretKey: "OPENAI_API_KEY"
    openai-api:
      enabled: true
      apiKeySecretKey: "OPENAI_API_KEY"

# Qdrant is shipped by cto-app's local qdrant Argo Application. Morgan uses
# mem0 for long-term memory against that in-cluster service.
memorySearch:
  enabled: false

plugins:
  memoryCore:
    enabled: true

openmemory:
  enabled: false

mem0:
  enabled: false

mem0Plugin:
  enabled: true
  mode: open-source
  userId: "local:morgan"
  autoRecall: true
  autoCapture: true
  topK: 5
  searchThreshold: 0.3
  metadataSource: "desktop"
  customCategories:
    - "project"
    - "decision"
    - "preference"
  customInstructions: >-
    Capture durable Morgan desktop bootstrap context only: project decisions,
    user preferences, blockers, and validation results. Keep entries concise and
    avoid secrets or transient log noise.
  oss:
    collectionName: "cto_memory"
    vectorStore:
      provider: "qdrant"
      config:
        host: "qdrant.cto-system.svc.cluster.local"
        port: 6333
    embedder:
      provider: "openai"
      config:
        model: "text-embedding-3-small"
        apiKeyEnvVar: "PROVIDER_OPENAI_API_KEY"
    llm:
      provider: "openai"
      config:
        model: "gpt-4.1-nano"
        apiKeyEnvVar: "PROVIDER_OPENAI_API_KEY"

# The optional local observability Application ships Loki at this in-cluster
# endpoint. Keep telemetry gated off by default so Morgan never requires Loki.
telemetry:
  enabled: false
  promtail:
    lokiUrl: "http://observability-loki.cto-system.svc.cluster.local:3100/loki/api/v1/push"

# NATS is not shipped by cto-app's bootstrap yet.
nats:
  enabled: false

# Avoid requiring a ghcr-secret volume in the public desktop install.
kaniko:
  enabled: false

tokenjuice:
  enabled: true

browser:
  enabled: false

codeServer:
  enabled: true
  publicUrl: "http://localhost:8080/morgan/code"
  quickTunnel:
    enabled: false

projectApi:
  enabled: true
  allowedOrigins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://tauri.localhost,https://tauri.localhost,tauri://localhost"

ssh:
  enabled: false

# Voice/narrator endpoints stay disabled until the desktop bundle ships the
# local voice bridge and backing workers. The local ingress template will expose
# narrator routes automatically when this is enabled later.
narrator:
  enabled: false

gateway:
  auth:
    token: "openclaw-internal"
  controlUi:
    enabled: true
    basePath: "/openclaw"
  http:
    endpoints:
      chatCompletions:
        enabled: true
      responses:
        enabled: false

localIngress:
  enabled: true
  className: nginx
  host: localhost
  pathBase: /morgan
  pathType: ImplementationSpecific
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

session:
  scope: "per-sender"
  dmScope: "per-channel-peer"
  agentToAgent:
    maxPingPongTurns: 5
  threadBindings:
    enabled: true
    idleHours: 24
    maxAgeHours: 0
  reset:
    mode: "daily"
    atHour: 4
    idleMinutes: 480

tools:
  profile: "full"
  agentToAgent:
    enabled: true
  elevated:
    enabled: true
  exec:
    host: "gateway"
    security: "full"
    pathPrepend:
      - "/usr/local/bin"
      - "/usr/local/share/npm-global/bin"
      - "/workspace/.local/bin"
      - "/root/.local/bin"
    backgroundMs: 5000
    cleanupMs: 1800000
    notifyOnExit: true
    applyPatch:
      enabled: true
  message:
    broadcast:
      enabled: true
  web:
    search:
      enabled: true
    fetch:
      enabled: true
  sessions:
    visibility: "all"
  acp:
    enabled: true
    backend: "acpx"
    acpxVersion: "0.5.3"
    defaultAgent: "claude"
    allowedAgents:
      - "claude"
      - "codex"
      - "opencode"
      - "gemini"
      - "kimi"
      - "copilot"
      - "cursor"
      - "pi"
      - "droid"
      - "kilocode"
      - "kiro"
      - "qwen"
      - "iflow"
    maxConcurrentSessions: 8
    permissionMode: "approve-all"
    nonInteractivePermissions: "deny"
    pluginToolsMcpBridge: true
    dispatch:
      enabled: true
    stream:
      coalesceIdleMs: 300
      maxChunkChars: 1200
    runtime:
      ttlMinutes: 120
    agentOverrides:
      claude:
        command: "claude-agent-acp"
      codex:
        command: "codex-acp"
      opencode:
        command: "opencode acp"
      gemini:
        command: "gemini --experimental-acp --yolo"
      copilot:
        command: "copilot --acp --yolo --no-ask-user --model claude-opus-4.7"
      kimi:
        command: "kimi acp"
      droid:
        command: "droid exec --output-format acp"
      cursor:
        command: "cursor-agent acp --yolo --trust"
      pi:
        command: "pi-acp"

# Existing CTO tools service from the cto chart. The agent chart normalizes this
# /mcp URL for CLI stdio bridges, while OpenClaw can use it directly.
toolServer:
  url: "http://cto-tools.cto-system.svc.cluster.local:8080/mcp"

# Claude Code sidecar config is disabled for the local bootstrap to avoid
# shipping MCP endpoints for services cto-app does not install yet. ACP still
# exposes claude-agent-acp when present in the agent image.
claudeCode:
  enabled: false

codexPlugin:
  enabled: true
  approvalPolicy: "never"
  sandbox: "workspace-write"
  authSecretKey: "CODEX_AUTH_SUB1"
  authSecretKeySub2: "CODEX_AUTH_SUB2"

cloudProviders:
  bedrock:
    enabled: false
  vertex:
    enabled: false
  foundry:
    enabled: false

toolsConfig:
  remoteTools:
    - "argocd_*"
    - "filesystem_*"
    - "github_*"
    - "kubernetes_*"
  localServers: {}

cliBackends:
  claude-cli:
    command: "/usr/local/share/npm-global/bin/claude"
  codex-cli:
    command: "/usr/local/share/npm-global/bin/codex"
  gemini-cli:
    command: "/usr/local/share/npm-global/bin/gemini"
  kimi-cli:
    command: "/usr/local/bin/kimi"
  cursor-cli:
    command: "/usr/local/bin/cursor-agent"
  opencode-cli:
    command: "/usr/local/bin/opencode"
  droid-cli:
    command: "/usr/local/bin/droid"
    args:
      - "--json"
    output: "json"

workspace:
  repos: []
  files:
    AGENTS.md: |
      # AGENTS.md -- Morgan

      You are **Morgan**, the local technical program manager for CTO Desktop.

      ## Default Interaction Style

      - Lead with the recommendation, then the reason, then the next step.
      - Keep responses concise and spoken-friendly unless the user asks for depth.
      - Treat the current user request as the priority; do not start side quests.
      - Use tools for requested actions and summarize results directly.
      - Prefer ACP sessions for coding-agent delegation when they are available.

    SOUL.md: |
      # Morgan -- Soul

      You are steady, pragmatic, technically fluent, and focused on helping the
      user move from ambiguity to execution in the local CTO desktop stack.

    IDENTITY.md: |
      # IDENTITY.md

      - **Name:** Morgan
      - **Role:** Local technical program manager and OpenClaw gateway agent
      - **Primary mode:** Fast, spoken-friendly execution guidance
      - **Model:** Gemini 2.5 Flash

    TOOLS.md: |
      # TOOLS.md -- Morgan

      ## Local CTO Tools

      - CTO tools MCP endpoint: `http://cto-tools.cto-system.svc.cluster.local:8080/mcp`
      - Root workspace: `/workspace`
      - User projects should live under `/workspace/repos/<slug>` when created.

      ## ACP Sessions

      Prefer one-shot ACP `run` sessions with an explicit `cwd` for coding tasks.
      Use persistent ACP sessions only when the user explicitly asks for a
      long-running coding session.

    HEARTBEAT.md: |
      # HEARTBEAT.md -- Morgan

      If there is active user work, continue that work first. If idle, keep checks
      lightweight: verify the local gateway is healthy and ACP harness commands
      still resolve on PATH. Do not start unrelated projects on your own.

    MEMORY.md: |
      # MEMORY.md -- Morgan

      - This Morgan instance backs the CTO Desktop local OpenClaw gateway.
      - The runtime lives in the local kind cluster in the `cto-system` namespace.
      - Long-term memory uses the local Qdrant service at
        `qdrant.cto-system.svc.cluster.local:6333` through the mem0 plugin.
