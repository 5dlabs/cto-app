# =============================================================================
# OpenClaw Gateway Helm Chart - Default Values
# =============================================================================
# Each agent is deployed as a separate Helm release via ArgoCD.
# Per-agent overrides are provided via inline values in the ArgoCD Application.

# -- Namespace for all resources
namespace: bots

# -- Create namespace (handled by ArgoCD syncOptions instead)
createNamespace: false

# -- Workload kind: "deployment" (default) or "statefulset".
# StatefulSets give each agent a stable pod identity and ordered
# rollouts — the preferred shape for long-lived, workspace-bound
# agents like Coder and Morgan. The chart uses the existing PVC
# (templates/pvc.yaml) as the workspace volume in both modes.
deploymentMode: deployment

# -- Image configuration
image:
  repository: registry.5dlabs.ai/5dlabs/openclaw
  tag: "v2026.2.12"
  pullPolicy: Always

openclaw:
  # Optional npm package version to install before starting the gateway. Leave
  # empty to use the OpenClaw version baked into the image.
  version: ""

# -- Image pull secrets
imagePullSecrets:
  - name: ghcr-secret

# -- Resource requests (no CPU limits — let agents burst freely)
resources:
  requests:
    cpu: "50m"
    memory: "256Mi"
  limits:
    memory: "4Gi"

# -- Node selector (optional)
# Leave empty by default so local kind clusters can schedule agents without
# requiring a separate worker pool.
nodeSelector: {}

# Optional tolerations for clusters that schedule agents on tainted nodes
tolerations: []

# -- Storage configuration
storage:
  storageClass: mayastor
  size: 10Gi

# -- Extra environment variables injected into the agent container
extraEnv: []
# Example:
# extraEnv:
#   - name: MY_FLAG
#     value: "true"

# -- Extra envFrom sources injected into the agent container
extraEnvFrom: []
# Example:
# extraEnvFrom:
#   - secretRef:
#       name: my-secret

# =============================================================================
# Workspace Initialization
# =============================================================================
# Repos to clone into the agent's workspace on first boot.
# On subsequent restarts, the init container checks for dirty state
# (uncommitted changes, detached HEAD, etc.) and logs warnings instead
# of clobbering existing work.
workspace:
  repos: []
  # Example: clone the CTO repo for each agent
  # repos:
  #   - name: cto
  #     url: "https://gitlab.5dlabs.ai/5dlabs/cto.git"
  #     branch: "main"
  #     path: "repos/cto"   # relative to /workspace

# =============================================================================
# Agent Configuration
# =============================================================================
agent:
  # -- Unique agent identifier (e.g., "metal", "trader", "forge")
  id: ""
  # -- Display name (e.g., "Metal", "Trader", "Forge")
  name: ""
  # -- Primary model for the agent runtime.
  model: "anthropic/claude-3-5-haiku-latest"
  # -- Heartbeat interval
  heartbeat:
    every: "15m"
    target: "last"
    ackMaxChars: 500
  # -- Sandbox mode
  sandbox: "off"
  # -- Default delivery recipient (e.g. "channel:1234567890" or "user:1234567890")
  # Used as a fallback when the session has no explicit resolved target. Fixes
  # silent final-response delivery failures ("Discord recipient is required").
  defaultRecipient: ""
  # -- Allowed tool groups (empty = all tools available, no restrictions)
  tools:
    allow: []

# =============================================================================
# Discord Configuration
# =============================================================================
discord:
  enabled: true
  # -- Discord account ID (usually matches agent.id)
  accountId: ""
  # -- Key in the openclaw-discord-tokens Secret for this agent's token
  tokenSecretKey: ""
  # -- Group policy for this account
  groupPolicy: "allowlist"
  # -- Guild configuration
  guilds:
    # Wildcard guild (all servers)
    "*":
      requireMention: true
      # -- User IDs allowed to interact
      users:
        - "444519104808878090"
    # 5dlabs guild
    "1409006087331512342":
      requireMention: true
      slug: "5dlabs"
      channels:
        "1409006087969177735":
          enabled: true
          requireMention: true
        "1445330230926381056":
          enabled: true
          requireMention: true
        # Agent-to-agent coordination channel (no @mention required)
        "1467540094490640529":
          enabled: true
          requireMention: false
  # -- Allow bot interactions
  allowBots: true
  # -- DM policy (must be explicitly "allowlist" — see MEMORY.md)
  dmPolicy: "allowlist"
  # -- Users allowed to DM (top-level, not nested under dm)
  allowFrom:
    - "444519104808878090"

# =============================================================================
# Model Providers
# =============================================================================
# API keys are injected via environment variables from ExternalSecrets
models:
  catalog:
    enabled: false
    generatedPath: "files/model-catalog.generated.json"
    # Optional operator override when generated artifact metadata is absent.
    syncedAt: ""
    # Empty list means all configured providers are eligible.
    allowProviders: []
    # Block specific model ids even if they exist in generated catalog.
    denyModels: []
  providers:
    anthropic:
      api: "anthropic-messages"
      baseUrl: "https://api.anthropic.com"
      auth: "api-key"
      apiKey: "${ANTHROPIC_API_KEY}"
      authHeader: true
      headers: {}
      models:
        - id: "claude-3-5-haiku-latest"
          name: "Claude 3.5 Haiku"
        - id: "claude-sonnet-4-20250514"
          name: "Claude Sonnet 4"
        - id: "claude-opus-4-20250514"
          name: "Claude Opus 4"
        - id: "claude-opus-4-6-20260201"
          name: "Claude Opus 4.6"
    openai:
      api: "openai-responses"
      baseUrl: "https://api.openai.com/v1"
      auth: "api-key"
      apiKey: "${OPENAI_API_KEY}"
      authHeader: true
      headers: {}
      models:
        - id: "gpt-4o"
          name: "GPT-4o"
        - id: "text-embedding-3-small"
          name: "Text Embedding 3 Small"
        - id: "text-embedding-3-large"
          name: "Text Embedding 3 Large"
    openai-api:
      api: "openai-responses"
      baseUrl: "https://api.openai.com/v1"
      auth: "api-key"
      enabled: true
      apiKey: "${OPENAI_API_KEY}"
      authHeader: true
      headers: {}
      models:
        - id: "gpt-5.4"
          name: "GPT-5.4"
        - id: "gpt-5.3-codex"
          name: "GPT-5.3 Codex"

# =============================================================================
# Agent Defaults (global across all agents)
# =============================================================================
agentDefaults:
  thinkingDefault: "high"
  compaction:
    mode: "safeguard"
    reserveTokensFloor: 25000
    memoryFlush:
      enabled: true
      softThresholdTokens: 6000
      prompt: >-
        Before this conversation is compacted, write lasting notes to
        memory/YYYY-MM-DD.md using the following structure:
        ## Ongoing Tasks (status, next steps, blockers)
        ## Decisions Made (what was decided and why)
        ## User Preferences Learned (new preferences or corrections)
        ## Key Context (anything that should persist across sessions)
        Be specific and concise. Include names, IDs, and URLs.
        Update or amend existing entries rather than duplicating them.
        If nothing meaningful to store, reply NO_REPLY.
  contextPruning:
    mode: "cache-ttl"
    ttl: "1h"
  elevatedDefault: "full"
  maxConcurrent: 4
  heartbeat:
    every: "15m"
    target: "last"
    ackMaxChars: 500
    prompt: >-
      Read HEARTBEAT.md if it exists. Follow it strictly.
      AUTONOMY: When you have clear work to do, execute it.
      Don't ask for permission to sequence tasks - determine logical priority
      (dependencies, urgency, complexity) and proceed.
      Ask only when genuinely blocked or when a decision requires user preferences
      you cannot infer. Report results, not 'what should I do next?'.
      If a background process exited unexpectedly, investigate and restart it.
      Reply HEARTBEAT_OK only if nothing needs attention.

# =============================================================================
# Memory Search Configuration
# =============================================================================
memorySearch:
  enabled: true
  model: "text-embedding-3-small"
  provider: "openai"
  maxResults: 6
  timeoutMs: 4000
  sources:
    - "memory"
    - "sessions"
  cache:
    enabled: true
    maxEntries: 50000
  hybrid:
    enabled: true
    textWeight: 0.3
    vectorWeight: 0.7
    candidateMultiplier: 4
  sessionMemory: true
  sync:
    watch: true
    deltaBytes: 50000
    deltaMessages: 10
  gc:
    enabled: true
    retentionDays: 30
    maxFiles: 90

# =============================================================================
# Memory Configuration
# =============================================================================
memory:
  citations: "auto"
  snippetMaxChars: 700

# =============================================================================
# Session Configuration
# =============================================================================
session:
  dmScope: "per-channel-peer"
  reset:
    mode: "daily"
    atHour: 4
    idleMinutes: 240
  resetByType:
    dm:
      mode: "idle"
      idleMinutes: 480
    group:
      mode: "idle"
      idleMinutes: 240
    thread:
      mode: "daily"
      atHour: 4
  agentToAgent:
    maxPingPongTurns: 5

# =============================================================================
# Gateway Configuration (adapted for Kubernetes)
# =============================================================================
gateway:
  bind: "lan"
  port: 18789
  # In Kubernetes, gateway runs locally inside the pod (no remote SSH)
  mode: "local"
  # Pod-internal gateway — static token for health probes
  auth:
    token: "openclaw-internal"

# =============================================================================
# Optional local ingress
# =============================================================================
# Disabled by default. Desktop overlays can expose the gateway and enabled
# sidecars on a private localhost host with path-based routing.
localIngress:
  enabled: false
  className: nginx
  host: localhost
  pathBase: /morgan
  pathType: ImplementationSpecific
  voice:
    enabled: true
    serviceName: ""
    servicePortName: gateway
    servicePortNumber: null
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

# =============================================================================
# Optional SSH sidecar (disabled by default)
# =============================================================================
ssh:
  enabled: false
  port: 2222
  authorizedKeys: []

# =============================================================================
# Optional code-server sidecar (disabled by default)
# =============================================================================
codeServer:
  enabled: false
  port: 8080
  password: ""
  publicUrl: ""
  defaultFolder: "/workspace"
  quickTunnel:
    enabled: true

# =============================================================================
# Optional extra dev-server port on the agent Service
# =============================================================================
# Exposes an arbitrary TCP port on the agent's ClusterIP service so workloads
# launched inside the code-server shell (e.g. `next dev -H 0.0.0.0 -p 3000`)
# can be reached from a Cloudflare TunnelBinding without going through
# code-server's /proxy/<port> path.
devServer:
  enabled: false
  port: 3000
  name: dev-server

# =============================================================================
# Optional project-api sidecar (disabled by default)
# =============================================================================
# Bun HTTP service that surfaces the shared /workspace/repos PVC to the
# cto-app UI and to Morgan's tool layer. Creates/clones repos, tracks the
# "active project" pointer the agent reads on boot, and writes PRDs. See
# cto/apps/project-api/README.md for the full endpoint surface.
projectApi:
  enabled: false
  image:
    repository: ghcr.io/5dlabs/project-api
    tag: "latest"
    pullPolicy: Always
  # HTTP port inside the pod
  port: 8091
  # Service port exposed to cluster peers (defaults to port)
  servicePort: 8091
  # Filesystem layout on the shared workspace PVC
  reposRoot: /workspace/repos
  stateDir: /workspace/.openclaw
  # GitHub namespace checked by POST /projects
  githubOrg: "5dlabs"
  # CORS origins allowed to call the API (comma-separated list or "*").
  # Prefer explicit origins in production.
  allowedOrigins: "*"
  git:
    commitName: "Morgan"
    commitEmail: "morgan@5dlabs.ai"
  resources:
    requests:
      cpu: "10m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# =============================================================================
# Model Fallback Configuration
# =============================================================================
modelDefaults:
  primary: "anthropic/claude-3-5-haiku-latest"
  fallbacks:
    - "anthropic/claude-sonnet-4-20250514"
    - "openai-api/gpt-5.4"
    - "openai-api/gpt-5.3-codex"
    - "anthropic/claude-opus-4-6-20260201"

# =============================================================================
# Tools Configuration (Linux-adapted, no macOS paths)
# =============================================================================
tools:
  profile: "full"
  deny: []
  alsoAllow: []
  byProvider: {}
  agentToAgent:
    enabled: true
  elevated:
    enabled: true
    allowFrom: {}
  exec:
    # Linux paths only - no macOS /opt/homebrew or /Users paths
    host: "gateway"
    security: "full"
    ask: "off"
    node: ""
    safeBins: []
    safeBinTrustedDirs: []
    pathPrepend:
      - "/usr/local/bin"
      - "/usr/local/share/npm-global/bin"
      - "/workspace/.local/bin"
      - "/root/.local/bin"
    timeoutSec: 0          # No auto-kill — CLIs are long-lived services
    backgroundMs: 5000     # Auto-background after 5s (default 10s)
    cleanupMs: 1800000
    notifyOnExit: true     # Agent gets system event when a CLI exits/crashes
    applyPatch:
      enabled: true
      allowModels: []
  message:
    crossContext: {}
    broadcast:
      enabled: true
  acp:
    enabled: false
    backend: "acpx"
    acpxVersion: ""
    defaultAgent: "codex"
    allowedAgents: []
    agentOverrides: {}
    maxConcurrentSessions: 4
    permissionMode: "approve-all"
    nonInteractivePermissions: "deny"
    pluginToolsMcpBridge: false
    dispatch:
      enabled: true
    stream:
      coalesceIdleMs: 300
      maxChunkChars: 1200
    runtime:
      ttlMinutes: 120
    wsUrl: ""
    tokenFile: ""

# =============================================================================
# Kaniko Sidecar (daemonless container builds)
# =============================================================================
# Kaniko runs unprivileged container builds inside Kubernetes — no Docker socket.
# The agent writes a Dockerfile to /workspace and execs into the sidecar to build.
kaniko:
  enabled: true
  # Pin to a specific release so shim behavior is reproducible. `:debug` variant
  # is required (the shim execs into the sidecar and needs busybox / kubectl-exec
  # compatible environment).
  image: gcr.io/kaniko-project/executor:v1.23.2-debug
  # Registry to push built images
  registry: "registry.5dlabs.ai/5dlabs"
  # Cache repo for layer caching
  cacheRepo: "registry.5dlabs.ai/5dlabs/kaniko-cache"
  cache: true
  resources:
    requests:
      cpu: "25m"
      memory: "128Mi"
    limits:
      memory: "4Gi"

# =============================================================================
# CLI Backends (text-only fallback CLIs invoked by OpenClaw)
# =============================================================================
cliBackends:
  claude-cli:
    command: "/usr/local/bin/claude"
  codex-cli:
    command: "/usr/local/bin/codex"
  droid-cli:
    command: "/usr/local/bin/droid"
    args:
      - "--json"
    output: "json"
    modelArg: "--model"
    sessionArg: "--session"
    sessionMode: "existing"
    systemPromptArg: "--system"
    systemPromptWhen: "first"

# =============================================================================
# Claude Code CLI Configuration
# =============================================================================
# Controls the Claude Code CLI sessions invoked by OpenClaw agents via `exec`.
# Two separate ConfigMaps are generated:
#   1. claude-settings → settings.json (permissions, agent teams, telemetry)
#   2. claude-mcp      → .claude.json  (MCP server connections for coding tasks)
#
# These are DISTINCT from the OpenClaw gateway's own tool/MCP configuration
# defined in the main configmap.yaml (openclaw.json).
claudeCode:
  # -- Enable Claude Code CLI integration
  enabled: true
  # -- Pinned version installed in the Docker image (set via Dockerfile ARG)
  # This is informational only; the actual version is baked into the image.
  version: "2.1.32"

  # -- Permission settings for Claude Code CLI sessions
  permissions:
    # bypassPermissions = fully autonomous, no confirmation prompts
    defaultMode: "bypassPermissions"
    allow:
      - "Bash"
      - "Read"
      - "Edit"
      - "Write"
      - "WebFetch"
      - "WebSearch"
      - "Task"

  # -- Agent Teams (parallel sub-agent orchestration within Claude Code)
  agentTeams:
    enabled: true
    # in-process = all teammates run within the same Node.js process (K8s-safe)
    teammateMode: "in-process"

  # -- Disable co-authored-by commit attribution
  includeCoAuthoredBy: false

  # -- Disable telemetry in Claude Code CLI
  disableTelemetry: true

  # -- MCP servers available to Claude Code CLI sessions
  # These are the tools that the Claude Code coding agent can use when
  # invoked by an OpenClaw agent. Separate from OpenClaw's own tools.
  mcp:
    servers:
      # OpenMemory — persistent long-term agent memory (shared across all agents)
      openmemory:
        type: "sse"
        url: "http://openmemory.openmemory.svc.cluster.local:8080/mcp/sse"
      # Firecrawl — web scraping and content extraction
      firecrawl:
        command: "npx"
        args: ["-y", "firecrawl-mcp"]
        env:
          FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"

# =============================================================================
# Tools Config (MCP tools for CLI backends)
# =============================================================================
# Rendered into a separate ConfigMap (tools-config.json) and mounted at
# /workspace/tools-config.json. Provides remote and local MCP tools to CLI
# backends (Claude Code, Codex, Droid).
toolsConfig:
  remoteTools:
    - "exa_*"
    - "web_*_exa"
    - "firecrawl_*"
    - "tavily_*"
  localServers:
    memory:
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-memory"
      tools:
        - "create_entities"
        - "create_relations"
        - "add_observations"
        - "delete_entities"
        - "delete_observations"
        - "delete_relations"
        - "read_graph"
        - "search_nodes"
        - "open_nodes"

toolServer:
  url: ""

# =============================================================================
# Secrets Configuration
# =============================================================================
secrets:
  # -- Name of the Secret containing Discord bot tokens (one key per agent)
  discordTokensSecret: "openclaw-discord-tokens"
  # -- Name of the Secret containing shared API keys (Anthropic, OpenAI, etc.)
  apiKeysSecret: "openclaw-api-keys"

# =============================================================================
# Probes
# =============================================================================
probes:
  # OpenClaw gateway exposes a health endpoint
  startup:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: "debug"
  file: "/workspace/.openclaw/logs/openclaw.log"
  consoleLevel: "info"

# =============================================================================
# Control UI (accessible via Twingate)
# =============================================================================
controlUi:
  enabled: true

# =============================================================================
# Telemetry (Promtail sidecar → Loki)
# =============================================================================
telemetry:
  enabled: true
  promtail:
    image: grafana/promtail:latest
    lokiUrl: "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      memory: "128Mi"

# =============================================================================
# Cloud Provider Configuration
# =============================================================================
# Configure cloud-specific model providers (Bedrock, Vertex AI, Foundry).
# When a cloud provider is enabled, its models and credentials are injected
# into both the OpenClaw gateway (openclaw.json) and Claude Code CLI sessions.
# Only one cloud provider should be enabled at a time.
# Org policy: Amazon Bedrock stays disabled (cost); use Anthropic/OpenAI/Google APIs instead.
cloudProviders:
  # -- Amazon Bedrock (Claude via AWS) — leave disabled unless explicitly approved
  bedrock:
    enabled: false
    region: "us-east-2"
    # OpenClaw gateway provider config (renders into openclaw.json models.providers)
    openclaw:
      api: "bedrock-converse-stream"
      auth: "aws-sdk"
      models:
        - id: "us.anthropic.claude-opus-4-6-v1:0"
          name: "Claude Opus 4.6 (Bedrock)"
          reasoning: true
          input: ["text", "image"]
          contextWindow: 200000
          maxTokens: 8192
        - id: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
          name: "Claude Sonnet 4.5 (Bedrock)"
        - id: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          name: "Claude Haiku 4.5 (Bedrock)"
    # Claude Code CLI env vars (renders into settings.json env block)
    claudeCode:
      model: "global.anthropic.claude-opus-4-6-v1"
      opusModel: "global.anthropic.claude-opus-4-6-v1"
      sonnetModel: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
      haikuModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
      subagentModel: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"

  # -- Google Vertex AI (Claude via GCP)
  vertex:
    enabled: false
    region: "global"
    projectId: ""
    claudeCode:
      model: ""
      sonnetModel: ""
      haikuModel: ""

  # -- Microsoft Foundry (Claude via Azure)
  foundry:
    enabled: false
    resource: ""
    apiKeySecret: ""
    claudeCode:
      model: ""

# =============================================================================
# NATS Inter-Agent Messaging
# =============================================================================
# Enables cross-pod agent communication via NATS publish/subscribe.
# Each agent subscribes to agent.<id>.inbox and agent.all.broadcast.
# agentName defaults to agent.id — no per-agent override needed.
nats:
  enabled: true
  url: "nats://nats.messaging.svc.cluster.local:4222"
  extraSubjects: []
  reconnectWaitMs: 2000
  maxReconnectAttempts: -1
  agentRole: "general"
  maxPingPongTurns: 10
  pingPongWindowMs: 300000
  roster:
    - { id: alert, role: "Alerting & monitoring" }
    - { id: conductor, role: "Orchestration coordinator" }
    - { id: forge, role: "DevOps, K8s, CI/CD" }
    - { id: holt, role: "Backend engineering" }
    - { id: infra, role: "Cluster management" }
    - { id: keeper, role: "Security & secrets" }
    - { id: metal, role: "Lead engineering, architecture" }
    - { id: pitch, role: "Sales & marketing" }
    - { id: planner, role: "Task breakdown, scheduling" }
    - { id: playmon, role: "Workflow monitoring" }
    - { id: pm, role: "Project management" }
    - { id: research, role: "Web research" }
    - { id: stitch, role: "Code review" }
    - { id: trader, role: "Market research & trading" }

# =============================================================================
# TokenJuice Plugin (bundled with OpenClaw)
# =============================================================================
# Compacts noisy `exec` / `bash` tool_result output before it flows back into
# the session. Preserves exit codes and file-content reads. Opt-in per agent.
# https://docs.openclaw.ai/tools/tokenjuice

tokenjuice:
  enabled: false

# =============================================================================
# Mem0 Plugin (@mem0/openclaw-mem0)
# =============================================================================
# Long-term memory backed by Qdrant. Single shared collection, scoped by userId.
# https://docs.mem0.ai/integrations/openclaw

mem0Plugin:
  enabled: false
  mode: "open-source"
  userId: "jonathon"
  autoRecall: true
  autoCapture: true
  topK: 5
  searchThreshold: 0.3
  oss:
    collectionName: "cto_memory"
    vectorStore:
      provider: "qdrant"
      config:
        host: "qdrant.cto.svc.cluster.local"
        port: 6333
    embedder:
      provider: "google"
      config:
        model: "gemini-embedding-001"
        apiKeyEnvVar: "GOOGLE_API_KEY"
    llm:
      provider: "anthropic"
      config:
        model: "claude-3-5-haiku-latest"
        apiKeyEnvVar: "ANTHROPIC_API_KEY"

# =============================================================================
# Narrator Sidecars (dual sidecar architecture for live narration)
# =============================================================================
# Two CPU-only sidecars that tail the ACP stream, generate narration phrases,
# synthesize TTS audio, and stream via WebRTC. RPC out to GPU workers for lipsync.
#
# musetalk-sidecar: Narration for MuseTalk avatar (port 8081)
# hunyuan-sidecar: Narration for Hunyuan avatar (port 8082)
#
# Both sidecars share the same base image but run as separate containers with
# different BACKEND env vars.

narrator:
  enabled: false
  image:
    repository: ghcr.io/5dlabs/narrator-sidecar-base
    tag: latest
    pullPolicy: Always
  # Path the agent writes ACP NDJSON to (shared PV). Both sidecars tail this.
  # Must match .Values.logging.rawStreamPath when narrator.enabled=true.
  rawStreamPath: /workspace/.openclaw/raw-stream.log
  # Sidecars append interrupt events here; the agent-side ACP bridge (Phase C)
  # tails this file and calls session/cancel + session/prompt.
  interruptPath: /workspace/.narrator/interrupt.jsonl
  persona:
    id: rex
    voiceSamplePath: /models/voice-samples/rex.mp3
  # Shared NATS endpoint for both lipsync backends. Per-backend subjects
  # live under .musetalk / .hunyuan so they can target different workers
  # once the worker charts adopt per-backend subject naming.
  lipsyncNatsUrl: "nats://musetalk-nats.cto.svc.cluster.local:4222"
  musetalk:
    enabled: true
    port: 8081
    backend: musetalk
    workerUrl: "http://musetalk-worker.cto.svc.cluster.local:8080"
    lipsyncSubject: "avatar.render.request"
    lipsyncResultSubject: "avatar.render.result"
  hunyuan:
    enabled: true
    port: 8082
    backend: hunyuan
    workerUrl: "http://hunyuan-avatar-worker.cto.svc.cluster.local:8080"
    lipsyncSubject: "avatar.render.request"
    lipsyncResultSubject: "avatar.render.result"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 10
    readiness:
      path: /ready
      initialDelaySeconds: 10
      periodSeconds: 5
