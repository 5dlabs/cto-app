global:
  # Empty = use cluster default (kind ships local-path-provisioner)
  storageClass: ""
  # Optional image pull secrets for ephemeral agent pods. Default empty.
  imagePullSecrets: []
  # Namespace for the platform. Created by templates/namespace.yaml.
  namespace: cto-system

# Agent / model provider API keys. Rendered as a single plain Kubernetes Secret
# named `cto-agent-keys`. The desktop app prompts the user for these on first run
# and writes them here before `helm install`.
agentKeys:
  GITHUB_TOKEN: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  OPENROUTER_API_KEY: ""
  FIREWORKS_API_KEY: ""
  GEMINI_API_KEY: ""
  GOOGLE_API_KEY: ""
  XAI_API_KEY: ""
  PERPLEXITY_API_KEY: ""
  FIRECRAWL_API_KEY: ""
  TAVILY_API_KEY: ""
  EXA_API_KEY: ""
  CURSOR_API_KEY: ""
  CONTEXT7_API_KEY: ""
  BRAVE_API_KEY: ""
  FACTORY_API_KEY: ""
  MINIMAX_API_KEY: ""
  MINIMAX_GROUP_ID: ""
  ELEVENLABS_API_KEY: ""

controller:
  enabled: true
  image:
    repository: ghcr.io/5dlabs/controller
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Template set identifier used by the controller
  templateVersion: cto
  skillsCache:
    enabled: true
    size: 10Gi
  service:
    type: ClusterIP
    port: 8080
  # Static/manual CodeRun preflight. Disabled by default so normal desktop
  # installs do not create runnable CodeRun objects. CI enables this to render
  # a minimal Hermes CodeRun without requiring live controller images or keys.
  codeRunSmoke:
    enabled: false
    name: hermes-coderun-smoke
    harnessAgent: hermes
    runType: documentation
    service: hermes-smoke
    repositoryUrl: https://github.com/5dlabs/cto-app
    docsRepositoryUrl: https://github.com/5dlabs/cto-app
    workingDirectory: "."
    githubApp: hermes-smoke
    enableDocker: false
    enableCodeServer: false
    quality: false
    security: false
    testing: false
    deployment: false

agent:
  image:
    repository: ghcr.io/5dlabs/agents
    tag: latest
    pullPolicy: IfNotPresent
  serviceAccountName: cto-agent
  cliImages:
    claude:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    cursor:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    codex:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    code:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    gemini:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    factory:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    opencode:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    research:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent
    grok:
      repository: ghcr.io/5dlabs/agents
      tag: latest
      pullPolicy: IfNotPresent

tools:
  enabled: true
  # Docker-in-Docker sidecar for Docker-based MCP servers. Disabled by default
  # so desktop installs run in no-runtime mode without privileged containers or
  # Docker socket mounts. Enable only for privileged/self-hosted/server installs
  # that need Docker-backed MCP servers.
  dockerInDocker:
    enabled: false
  image:
    repository: ghcr.io/5dlabs/tools
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  # Path-based ingress on kind's NGINX. Host defaults to the ingress controller's listen addr.
  ingress:
    enabled: true
    className: nginx
    host: "localhost"
    path: /tools(/|$)(.*)
    pathType: ImplementationSpecific
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
  workspace:
    enabled: true
    size: 5Gi
  # MCP servers enabled in the tools deployment. Secrets for each server live inline here
  # to keep the config-source next to its consumer.
  servers:
    filesystem:
      enabled: true
      name: "Filesystem"
      description: "Local workspace file access for desktop agents"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "/data/workspace"
      workingDirectory: "/tmp"
    memory:
      enabled: true
      name: "Memory"
      description: "Ephemeral MCP memory store for local desktop tools"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-memory"
      workingDirectory: "/tmp"
    github:
      enabled: false
      name: "GitHub"
      description: "GitHub API operations when a user-owned token is configured"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-github"
      workingDirectory: "/tmp"
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
      secret:
        # keys: GITHUB_TOKEN
        GITHUB_TOKEN: ""
    kubernetes:
      enabled: false
      name: "Kubernetes"
      description: "Kubernetes API operations when a kubeconfig is configured"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "kubernetes-mcp-server@latest"
      workingDirectory: "/tmp"
      secret:
        # keys: KUBECONFIG (base64)
        KUBECONFIG: ""
    firecrawl:
      enabled: true
      name: "Firecrawl"
      description: "Web scraping, crawling, mapping, extraction, and search for research workflows"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "firecrawl-mcp"
      workingDirectory: "/tmp"
      env:
        FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
        # Keeps the MCP server bootable before a key is provisioned; calls still
        # fail explicitly until FIRECRAWL_API_KEY is present.
        FIRECRAWL_API_URL: "https://api.firecrawl.dev"
      secret:
        FIRECRAWL_API_KEY: ""
    tavily:
      enabled: true
      name: "Tavily"
      description: "Search, extract, crawl, map, and research tools for current web context"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "tavily-mcp@latest"
      workingDirectory: "/tmp"
      env:
        TAVILY_API_KEY: "${TAVILY_API_KEY}"
      secret:
        TAVILY_API_KEY: ""
    exa:
      enabled: true
      name: "Exa"
      description: "Neural web search and page fetch tools for research workflows"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "exa-mcp-server"
      workingDirectory: "/tmp"
      env:
        EXA_API_KEY: "${EXA_API_KEY}"
      secret:
        EXA_API_KEY: ""
    s3:
      enabled: false
      secret:
        AWS_ACCESS_KEY_ID: ""
        AWS_SECRET_ACCESS_KEY: ""
        AWS_REGION: ""
    argocd:
      enabled: false
      name: "Argo CD"
      description: "Argo CD API operations when credentials are configured"
      transport: "stdio"
      command: "cto-mcp"
      args: []
      workingDirectory: "/tmp"
      secret:
        ARGOCD_SERVER: ""
        ARGOCD_AUTH_TOKEN: ""
