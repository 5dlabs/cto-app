{{- /*
Plain Kubernetes Secret holding agent / model provider API keys.
Only non-empty values are rendered into stringData so unused providers
remain absent rather than empty.

Image pull secrets are intentionally NOT rendered here; if
.Values.global.imagePullSecrets is set the user is expected to have
created those secrets out-of-band (e.g. by `kubectl create secret
docker-registry`). Pod specs reference them via cto.imagePullSecrets.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: cto-agent-keys
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.agentKeys }}
{{- if $v }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
