apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto.controller.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "cto.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cto.controller.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/controller/configmap.yaml") . | sha256sum }}
    spec:
      {{- include "cto.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "cto.controller.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: controller-config
            - secretRef:
                name: cto-agent-keys
          env:
            - name: AGENT_TEMPLATES_PATH
              value: "/app/templates"
            {{- if .Values.controller.skillsCache.enabled }}
            - name: SKILLS_CACHE_PATH
              value: "/data/skills-cache"
            {{- end }}
          volumeMounts:
            {{- if .Values.controller.skillsCache.enabled }}
            - name: skills-cache
              mountPath: /data/skills-cache
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        {{- if .Values.controller.skillsCache.enabled }}
        - name: skills-cache
          persistentVolumeClaim:
            claimName: {{ include "cto.controller.fullname" . }}-skills-cache
        {{- end }}
