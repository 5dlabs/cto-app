{{- /*
One plain Kubernetes Secret per enabled MCP server that declares a
`secret:` block in values. Only non-empty entries are included so
unset providers stay absent. Consumed via envFrom in the tools
deployment.
*/ -}}
{{- if .Values.tools.enabled }}
{{- $root := . }}
{{- range $name, $cfg := .Values.tools.servers }}
{{- if and $cfg.enabled $cfg.secret }}
{{- $hasData := false }}
{{- range $k, $v := $cfg.secret }}{{- if $v }}{{- $hasData = true }}{{- end }}{{- end }}
{{- if $hasData }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cto.tools.serverSecretName" (dict "root" $root "name" $name) }}
  namespace: {{ include "cto.namespace" $root }}
  labels:
    {{- include "cto.tools.labels" $root | nindent 4 }}
    cto.5dlabs.ai/mcp-server: {{ $name | quote }}
type: Opaque
stringData:
{{- range $k, $v := $cfg.secret }}
{{- if $v }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
