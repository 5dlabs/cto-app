{{- if and .Values.tools.enabled .Values.tools.workspace.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cto.tools.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.tools.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.tools.workspace.size }}
  {{- with .Values.global.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
