{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "voice-bridge.fullname" . }}
  namespace: {{ include "voice-bridge.namespace" . }}
  labels:
    {{- include "voice-bridge.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      {{- else }}
    -
      {{- end }}
      http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType | default "Exact" }}
            backend:
              service:
                name: {{ include "voice-bridge.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
