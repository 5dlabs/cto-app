---
# Morgan — always-up local OpenClaw gateway/agent for CTO Desktop.
#
# Uses the published agent OCI chart and the chart-packaged Morgan values file.
# The values intentionally deploy into cto-system so Morgan can use the local
# cto-tools service without cross-namespace secrets or service discovery.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: morgan
  namespace: argocd
  labels:
    app.kubernetes.io/name: morgan
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: agent
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: ghcr.io/5dlabs/helm-charts
    chart: agent
    targetRevision: 0.1.3
    helm:
      releaseName: morgan
      valueFiles:
        - ci/values-morgan.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cto-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
