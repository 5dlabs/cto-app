---
# Morgan — always-up local OpenClaw gateway/agent for CTO Desktop.
#
# Uses the published agent OCI chart and the chart-packaged Morgan values file.
# The values intentionally deploy into cto so Morgan can use the local
# cto-tools service without cross-namespace secrets or service discovery.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: morgan
  namespace: argocd
  labels:
    app.kubernetes.io/name: morgan
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: agent
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: ghcr.io/5dlabs/helm-charts
    chart: agent
    # Keep this pinned to a chart version that is actually published to GHCR.
    # Clean desktop installs cannot reconcile against unpublished local chart
    # source versions.
    targetRevision: 0.1.15
    helm:
      releaseName: morgan
      valueFiles:
        - ci/values-morgan.yaml
      valuesObject:
        harness: openclaw
        namespace: cto
        global:
          namespace: cto
        openclaw:
          # The desktop agents image already includes OpenClaw. Do not install
          # or downgrade the global package at runtime in the non-root container.
          version: ""
        # Local-only credential hook. If this secret exists, private/internal
        # GHCR runtime images can pull; if packages are public, Kubernetes can
        # still pull anonymously even if the secret is absent.
        imagePullSecrets:
          - name: ghcr-pull-secret
        storage:
          # Kind exposes its local-path provisioner as the "standard" storage
          # class. The published chart defaults to mayastor, which is not
          # present in the desktop Kind cluster.
          storageClass: "standard"
        agent:
          # Keep the live desktop app equivalent to the OVH Morgan reference
          # even when consuming a previously published chart package.
          model: "google/gemini-2.5-flash"
        modelDefaults:
          primary: "google/gemini-2.5-flash"
          fallbacks:
            - "anthropic/claude-sonnet-4-20250514"
            - "openai-api/gpt-5.4"
            - "openai-api/gpt-5.3-codex"
            - "anthropic/claude-opus-4-6-20260201"
        models:
          providers:
            google:
              enabled: true
              api: "google-generative-ai"
              baseUrl: "https://generativelanguage.googleapis.com/v1beta"
              apiKeySecretKey: "GEMINI_API_KEY"
              models:
                - id: "gemini-2.5-flash"
                  name: "Gemini 2.5 Flash"
                - id: "gemini-2.5-pro"
                  name: "Gemini 2.5 Pro"
            anthropic:
              enabled: true
              apiKeySecretKey: "ANTHROPIC_API_KEY"
            openai:
              enabled: true
              apiKeySecretKey: "OPENAI_API_KEY"
            openai-api:
              enabled: true
              apiKeySecretKey: "OPENAI_API_KEY"
        projectApi:
          image:
            # The current upstream latest image was compiled with a Bun runtime
            # that drops into `bun --help`; pin the desktop bootstrap to the
            # rebuilt multi-arch image until upstream latest is republished.
            tag: "desktop-bun-1.3.13"
        mem0Plugin:
          # Match the working OVH Morgan memory provider settings. The vector
          # store host remains local because desktop deploys Qdrant in cto.
          userId: "jonathon"
          oss:
            vectorStore:
              provider: "qdrant"
              config:
                host: "qdrant.cto.svc.cluster.local"
                port: 6333
            embedder:
              provider: "google"
              config:
                model: "gemini-embedding-001"
                apiKeyEnvVar: "GOOGLE_API_KEY"
            llm:
              provider: "anthropic"
              config:
                model: "claude-3-5-haiku-latest"
                apiKeyEnvVar: "ANTHROPIC_API_KEY"
        telemetry:
          promtail:
            lokiUrl: "http://observability-loki.cto.svc.cluster.local:3100/loki/api/v1/push"
        toolServer:
          url: "http://cto-tools.cto.svc.cluster.local:3000/mcp"
        workspace:
          files:
            TOOLS.md: |
              # TOOLS.md -- Morgan

              ## Local CTO Tools

              - CTO tools MCP endpoint: `http://cto-tools.cto.svc.cluster.local:3000/mcp`
              - Root workspace: `/workspace`
              - User projects should live under `/workspace/repos/<slug>` when created.

              ## ACP Sessions

              Prefer one-shot ACP `run` sessions with an explicit `cwd` for coding tasks.
              Use persistent ACP sessions only when the user explicitly asks for a
              long-running coding session.
            MEMORY.md: |
              # MEMORY.md -- Morgan

              - This Morgan instance backs the CTO Desktop local OpenClaw gateway.
              - The runtime lives in the local kind cluster in the `cto` namespace.
              - Long-term memory uses the local Qdrant service at
                `qdrant.cto.svc.cluster.local:6333` through the mem0 plugin.

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
