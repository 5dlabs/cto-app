<text x="92" y="222" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">CC Install GitLab on CTO selected. I’ll prepare the CTO GitLab deployment before connecting</text>
<text x="92" y="246" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Morgan. Source MorganInstall me on your environment. SOURCE Pick the logo you recognize.</text>
<text x="92" y="270" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Morgan installs the app, detects access, and asks for anything else only if it appears.</text>
<text x="92" y="294" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Install me on your environment. Install Morgan on GitHub github.com Install Morgan on GitLab</text>
<text x="92" y="318" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">gitlab.com Install GitLab on CTO self-hosted Install Morgan on GitLab, then Morgan detects</text>
<text x="92" y="342" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">your groups and projects. Hosted, self-hosted, and token fallbacks stay in Review details.</text>
<text x="92" y="366" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Install Morgan on self-managed GitLab Morgan opens the self-managed GitLab app flow after</text>
<text x="92" y="390" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">confirming the server URL. Review details GITLAB SELF-MANAGED URL GITLAB NAMESPACE, GROUP,</text>
<text x="92" y="414" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">OR PROJECT Morgan uses this only after sign-in shows which accounts are available.</text>
<text x="92" y="438" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Self-managed GitLab will use the instance OAuth application API at/api/v4/applications.</text>
<text x="92" y="462" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">GitHub authorization timed out. Close any stale GitHub prompt, switch to the right browser</text>
<text x="92" y="486" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">profile, and try again. Continue</text>
