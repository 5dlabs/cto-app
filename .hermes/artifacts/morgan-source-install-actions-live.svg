<text x="92" y="270" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Morgan installs the app, detects access, and asks for anything else only if it appears.</text>
<text x="92" y="294" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Install me on your environment. GitHub github.com GitLab gitlab.com CTO GitLab self-hosted</text>
<text x="92" y="318" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Install Morgan on GitLab, then Morgan detects your groups and projects. Hosted, self-hosted,</text>
<text x="92" y="342" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">and token fallbacks stay in Review details. Install Morgan on self-managed GitLab Morgan</text>
