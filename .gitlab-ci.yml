# GitLab mirror pipeline. The canonical flow runs on GitHub Actions;
# this pipeline is the peer for when we cut over to GitLab as primary SCM
# or push via the mirror-to-gitlab.yml workflow.
#
# Stages match the GitHub workflows:
#   - lint      <-> .github/workflows/chart-ci.yml
#   - publish   <-> .github/workflows/publish-chart.yml

stages:
  - ci
  - security
  - lint
  - publish
  - smoke
  - release

variables:
  HELM_VERSION: v3.16.2
  KUBECONFORM_VERSION: v0.6.4

default:
  # Tagged alpine/helm image already has helm + sh; add what we need.
  image: alpine/helm:${HELM_VERSION}
  before_script:
    - apk add --no-cache bash curl yq yamllint

.ci-rules: &ci-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'

ui:
  stage: ci
  image: node:20-bookworm
  <<: *ci-rules
  script:
    - npm ci --workspaces --include-workspace-root
    - npm --workspace ui run typecheck
    - |
      if grep -R -nE 'morgan-(ide|project-api|voice)\.5dlabs\.ai' ui/src; then
        echo "Morgan desktop defaults must use localhost ingress paths" >&2
        exit 1
      fi
    - npm --workspace ui run build

ci-tools:
  stage: ci
  image: rust:1.80-bookworm
  <<: *ci-rules
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --manifest-path crates/ci-tools/Cargo.toml --all -- --check
    - cargo test --manifest-path crates/ci-tools/Cargo.toml
    - cargo clippy --manifest-path crates/ci-tools/Cargo.toml --all-targets -- -W clippy::pedantic -D warnings

rust:
  stage: ci
  image: rust:1.80-bookworm
  <<: *ci-rules
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libasound2-dev build-essential curl wget file pkg-config
    - rustup component add rustfmt clippy
    - cd src-tauri
  script:
    - cargo fmt --all -- --check
    - cargo clippy --all-targets -- -W clippy::pedantic -D warnings

security:semgrep:
  stage: security
  image: semgrep/semgrep:latest
  <<: *ci-rules
  script:
    - semgrep scan --config auto --error

.chart-rules: &chart-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - .gitops/**/*
        - crates/ci-tools/**/*
        - .github/workflows/chart-ci.yml
        - .github/workflows/morgan-qdrant-smoke.yml
        - .gitlab-ci.yml
        - .yamllint.yaml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - .gitops/**/*
        - crates/ci-tools/**/*
        - .github/workflows/chart-ci.yml
        - .github/workflows/morgan-qdrant-smoke.yml
        - .gitlab-ci.yml
        - .yamllint.yaml
    - if: '$CI_COMMIT_TAG =~ /^chart-v/'

yaml-lint:
  <<: *chart-rules
  stage: lint
  script:
    - yamllint -c .yamllint.yaml .gitops

helm-lint:
  <<: *chart-rules
  stage: lint
  script:
    - |
      for chart in .gitops/charts/*/; do
        [ -f "$chart/Chart.yaml" ] || continue
        echo "helm lint $chart"
        helm lint "$chart"
        helm template check "$chart" --skip-tests > /dev/null
      done

schema-validation:
  <<: *chart-rules
  stage: lint
  script:
    - |
      curl -fsSL \
        "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
        -o kc.tgz
      tar -xzf kc.tgz
      mv kubeconform /usr/local/bin/kubeconform
    - |
      # Argo Application shape checks
      EXIT_CODE=0
      for app in .gitops/apps/*.yaml; do
        [ -f "$app" ] || continue
        KIND=$(yq eval '.kind' "$app")
        [ "$KIND" = "Application" ] || { echo "❌ $app kind=$KIND"; EXIT_CODE=1; }
      done
      exit $EXIT_CODE
    - |
      # Render each chart with ci/values-*.yaml overlays when present.
      EXIT_CODE=0
      for chart in .gitops/charts/*/; do
        [ -f "$chart/Chart.yaml" ] || continue
        value_files=()
        if [ -d "$chart/ci" ]; then
          for f in "$chart"/ci/values-*.yaml; do
            [ -f "$f" ] && value_files+=("$f")
          done
        fi
        if [ "${#value_files[@]}" -eq 0 ]; then
          value_files=("")
        fi
        for values in "${value_files[@]}"; do
          echo "kubeconform $chart (values=${values:-default})"
          if [ -n "$values" ]; then
            helm template check "$chart" --skip-tests -f "$values" \
              | kubeconform -strict -ignore-missing-schemas \
                  -schema-location default - || EXIT_CODE=1
          else
            helm template check "$chart" --skip-tests \
              | kubeconform -strict -ignore-missing-schemas \
                  -schema-location default - || EXIT_CODE=1
          fi
        done
      done
      exit $EXIT_CODE

morgan-qdrant-smoke:
  stage: smoke
  image: ubuntu:24.04
  <<: *chart-rules
  when: manual
  allow_failure: true
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl bash gcc g++ make pkg-config libssl-dev
    - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
    - install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
    - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
    - . "$HOME/.cargo/env"
    - rustup component add rustfmt clippy
  script:
    - . "$HOME/.cargo/env"
    - cargo fmt --manifest-path crates/ci-tools/Cargo.toml --all -- --check
    - cargo test --manifest-path crates/ci-tools/Cargo.toml
    - cargo clippy --manifest-path crates/ci-tools/Cargo.toml --all-targets -- -W clippy::pedantic -D warnings
    - cargo build --manifest-path crates/ci-tools/Cargo.toml --bin cto-ci-assert
    - mkdir -p .chart-ci-rendered
    - helm template qdrant .gitops/charts/qdrant --namespace cto-system > .chart-ci-rendered/qdrant-local-smoke.yaml
    - helm template morgan .gitops/charts/agent --namespace cto-system -f .gitops/charts/agent/ci/values-morgan.yaml > .chart-ci-rendered/agent-morgan-local-smoke.yaml
    - crates/ci-tools/target/debug/cto-ci-assert qdrant-render-config < .chart-ci-rendered/qdrant-local-smoke.yaml
    - crates/ci-tools/target/debug/cto-ci-assert morgan-mem0-config < .chart-ci-rendered/agent-morgan-local-smoke.yaml
    - crates/ci-tools/target/debug/cto-ci-assert morgan-diagnostics-config < .chart-ci-rendered/agent-morgan-local-smoke.yaml

chart:publish:
  stage: publish
  needs: [helm-lint, schema-validation, yaml-lint]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [".gitops/charts/**/*"]
    - if: '$CI_COMMIT_TAG =~ /^chart-v/'
  script:
    - mkdir -p dist
    - |
      for chart in .gitops/charts/*/; do
        [ -f "$chart/Chart.yaml" ] || continue
        helm package "$chart" --destination dist
      done
      ls -la dist/
    - |
      echo "${CI_REGISTRY_PASSWORD}" \
        | helm registry login "${CI_REGISTRY}" \
          --username "${CI_REGISTRY_USER}" \
          --password-stdin
    - |
      for pkg in dist/*.tgz; do
        echo "Pushing $pkg -> oci://${CI_REGISTRY_IMAGE}/helm-charts"
        helm push "$pkg" "oci://${CI_REGISTRY_IMAGE}/helm-charts"
      done
  artifacts:
    paths:
      - dist/*.tgz
    expire_in: 1 week

# Post-publish smoke tests. Two progressive jobs that each install the
# freshly published chart from OCI into a kind cluster, verify a single
# component comes up, and tear down. Mirrors .github/workflows/smoke-test.yml.
#
# Requires a GitLab runner with docker-in-docker (privileged) to host kind.
# Kept `when: manual` until an appropriate runner is wired up.

.smoke-common: &smoke-common
  stage: smoke
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    KIND_VERSION: v0.23.0
    K8S_VERSION: v1.30.0
    NS: cto-system
    CHART_REPO: oci://${CI_REGISTRY_IMAGE}/helm-charts/cto
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [".gitops/charts/**/*"]
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG =~ /^chart-v/'
      when: manual
      allow_failure: true
  before_script:
    - apk add --no-cache bash curl ca-certificates
    - curl -fsSL -o /usr/local/bin/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
    - chmod +x /usr/local/bin/kind
    - curl -fsSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/${K8S_VERSION}/bin/linux/amd64/kubectl"
    - chmod +x /usr/local/bin/kubectl
    - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

chart:smoke-controller:
  <<: *smoke-common
  needs: ["chart:publish"]
  script:
    - |
      set -eu
      V=$(awk '/^version:/ {print $2; exit}' .gitops/charts/cto/Chart.yaml)
      echo "Chart version: $V"
      CLUSTER=cto-smoke-ctl
      kind create cluster --name "$CLUSTER" --image "kindest/node:${K8S_VERSION}" --wait 120s
      kubectl get nodes -o wide

      D=$(mktemp -d)
      export HELM_CACHE_HOME="$D/cache" HELM_CONFIG_HOME="$D/config" HELM_DATA_HOME="$D/data"
      mkdir -p "$HELM_CACHE_HOME" "$HELM_CONFIG_HOME" "$HELM_DATA_HOME" /tmp/chart
      echo "${CI_REGISTRY_PASSWORD}" | helm registry login "${CI_REGISTRY}" --username "${CI_REGISTRY_USER}" --password-stdin
      helm pull "$CHART_REPO" --version "$V" --destination /tmp/chart

      helm install cto "/tmp/chart/cto-$V.tgz" \
        --namespace "$NS" --create-namespace \
        --set tools.enabled=false \
        --set controller.skillsCache.enabled=false \
        --wait --timeout=6m

      DEP=$(kubectl -n "$NS" get deploy -l app.kubernetes.io/name=controller -o name | head -1)
      if [ -z "$DEP" ]; then
        kubectl -n "$NS" get all
        echo "No controller deployment found" >&2; exit 1
      fi
      kubectl -n "$NS" wait "$DEP" --for=condition=Available --timeout=3m
      echo "✅ controller up"
      kubectl wait --for=condition=Established crd/coderuns.agents.platform --timeout=90s
      kubectl api-resources --api-group=agents.platform
      kubectl -n "$NS" apply -f - <<'YAML'
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: smoke-coderun
      spec:
        runType: documentation
        service: smoke
        repositoryUrl: https://github.com/5DLabsInc/cto
        docsRepositoryUrl: https://github.com/5DLabsInc/cto
        workingDirectory: .
        githubApp: smoke-test
      YAML
      kubectl -n "$NS" get coderun smoke-coderun -o jsonpath='{.spec.service}{"\n"}'
      echo "✅ CodeRun CRD accepts objects"
  after_script:
    - |
      kubectl -n "$NS" get events --sort-by=.lastTimestamp | tail -40 || true
      kubectl -n "$NS" logs -l app.kubernetes.io/component=controller --tail=200 || true
    - helm uninstall cto -n "$NS" --wait || true
    - kind delete cluster --name cto-smoke-ctl || true

chart:smoke-tools:
  <<: *smoke-common
  needs: ["chart:smoke-controller"]
  script:
    - |
      set -eu
      V=$(awk '/^version:/ {print $2; exit}' .gitops/charts/cto/Chart.yaml)
      echo "Chart version: $V"
      CLUSTER=cto-smoke-tools
      kind create cluster --name "$CLUSTER" --image "kindest/node:${K8S_VERSION}" --wait 120s
      kubectl get nodes -o wide

      D=$(mktemp -d)
      export HELM_CACHE_HOME="$D/cache" HELM_CONFIG_HOME="$D/config" HELM_DATA_HOME="$D/data"
      mkdir -p "$HELM_CACHE_HOME" "$HELM_CONFIG_HOME" "$HELM_DATA_HOME" /tmp/chart
      echo "${CI_REGISTRY_PASSWORD}" | helm registry login "${CI_REGISTRY}" --username "${CI_REGISTRY_USER}" --password-stdin
      helm pull "$CHART_REPO" --version "$V" --destination /tmp/chart

      helm install cto "/tmp/chart/cto-$V.tgz" \
        --namespace "$NS" --create-namespace \
        --set controller.enabled=false \
        --set tools.dockerInDocker.enabled=false \
        --set tools.workspace.enabled=false \
        --set tools.ingress.enabled=false \
        --wait --timeout=6m

      DEP=$(kubectl -n "$NS" get deploy -l app.kubernetes.io/component=tools -o name | head -1)
      if [ -z "$DEP" ]; then
        kubectl -n "$NS" get all
        echo "No tools deployment found" >&2; exit 1
      fi
      kubectl -n "$NS" wait "$DEP" --for=condition=Available --timeout=3m
      echo "✅ tools up (dind disabled)"
  after_script:
    - |
      kubectl -n "$NS" get events --sort-by=.lastTimestamp | tail -40 || true
      kubectl -n "$NS" logs -l app.kubernetes.io/component=tools --tail=200 --all-containers || true
    - helm uninstall cto -n "$NS" --wait || true
    - kind delete cluster --name cto-smoke-tools || true

tauri:e2e:
  stage: smoke
  image: ubuntu:24.04
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - .gitlab-ci.yml
        - .github/workflows/tauri-e2e.yml
        - e2e/**/*
        - scripts/e2e/**/*
        - src-tauri/**/*
        - ui/**/*
        - package.json
        - package-lock.json
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  variables:
    CTO_E2E_START_BOOTSTRAP: "0"
    CTO_E2E_RESET: "0"
    VITE_CTO_MORGAN_AUTOSTART: "0"
    VITE_CTO_FORCE_LOCAL_STACK_BOOTSTRAP: "1"
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends libayatana-appindicator3-dev libasound2-dev webkit2gtk-4.1 webkit2gtk-driver xvfb curl ca-certificates build-essential pkg-config libssl-dev
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
    - . "$HOME/.cargo/env"
  script:
    - npm ci
    - . "$HOME/.cargo/env"
    - cargo install tauri-driver --locked
    - |
      if compgen -G "e2e/tauri/**/*.e2e.mjs" > /dev/null; then
        xvfb-run -a npm run e2e:tauri
      else
        echo "No Tauri Selenium specs found; skipping."
      fi
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - .local/bootstrap-runs

release:linux:
  stage: release
  image: ubuntu:24.04
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libasound2-dev build-essential curl wget file pkg-config ca-certificates
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
    - . "$HOME/.cargo/env"
  script:
    - npm ci --workspaces --include-workspace-root
    - npm --workspace ui run build
    - . "$HOME/.cargo/env"
    - npm run tauri:build -- --target x86_64-unknown-linux-gnu
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*
