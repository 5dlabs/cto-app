# GitLab mirror pipeline. The canonical flow runs on GitHub Actions;
# this pipeline is the peer for when we cut over to GitLab as primary SCM
# or push via the mirror-to-gitlab.yml workflow.
#
# Stages match the GitHub workflows:
#   - lint      <-> .github/workflows/chart-ci.yml
#   - publish   <-> .github/workflows/publish-chart.yml

stages:
  - lint
  - publish

variables:
  HELM_VERSION: v3.16.2
  KUBECONFORM_VERSION: v0.6.4

default:
  # Tagged alpine/helm image already has helm + sh; add what we need.
  image: alpine/helm:${HELM_VERSION}
  before_script:
    - apk add --no-cache bash curl yq yamllint

.chart-rules: &chart-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - .gitops/**/*
        - .gitlab-ci.yml
        - .yamllint.yaml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - .gitops/**/*
        - .gitlab-ci.yml
        - .yamllint.yaml
    - if: '$CI_COMMIT_TAG =~ /^chart-v/'

yaml-lint:
  <<: *chart-rules
  stage: lint
  script:
    - yamllint -c .yamllint.yaml .gitops

helm-lint:
  <<: *chart-rules
  stage: lint
  script:
    - |
      for chart in .gitops/charts/*/; do
        [ -f "$chart/Chart.yaml" ] || continue
        echo "helm lint $chart"
        helm lint "$chart"
        helm template check "$chart" --skip-tests > /dev/null
      done

schema-validation:
  <<: *chart-rules
  stage: lint
  script:
    - |
      curl -fsSL \
        "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
        -o kc.tgz
      tar -xzf kc.tgz
      mv kubeconform /usr/local/bin/kubeconform
    - |
      # Argo Application shape checks
      EXIT_CODE=0
      for app in .gitops/apps/*.yaml; do
        [ -f "$app" ] || continue
        KIND=$(yq eval '.kind' "$app")
        [ "$KIND" = "Application" ] || { echo "❌ $app kind=$KIND"; EXIT_CODE=1; }
      done
      exit $EXIT_CODE
    - |
      # Render each chart with ci/values-*.yaml overlays when present.
      EXIT_CODE=0
      for chart in .gitops/charts/*/; do
        [ -f "$chart/Chart.yaml" ] || continue
        value_files=()
        if [ -d "$chart/ci" ]; then
          for f in "$chart"ci/values-*.yaml; do
            [ -f "$f" ] && value_files+=("$f")
          done
        fi
        if [ "${#value_files[@]}" -eq 0 ]; then
          value_files=("")
        fi
        for values in "${value_files[@]}"; do
          echo "kubeconform $chart (values=${values:-default})"
          if [ -n "$values" ]; then
            helm template check "$chart" --skip-tests -f "$values" \
              | kubeconform -strict -ignore-missing-schemas \
                  -schema-location default - || EXIT_CODE=1
          else
            helm template check "$chart" --skip-tests \
              | kubeconform -strict -ignore-missing-schemas \
                  -schema-location default - || EXIT_CODE=1
          fi
        done
      done
      exit $EXIT_CODE

chart:publish:
  stage: publish
  needs: [helm-lint, schema-validation, yaml-lint]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [".gitops/charts/**/*"]
    - if: '$CI_COMMIT_TAG =~ /^chart-v/'
  script:
    - mkdir -p dist
    - |
      for chart in .gitops/charts/*/; do
        [ -f "$chart/Chart.yaml" ] || continue
        helm package "$chart" --destination dist
      done
      ls -la dist/
    - |
      echo "${CI_REGISTRY_PASSWORD}" \
        | helm registry login "${CI_REGISTRY}" \
          --username "${CI_REGISTRY_USER}" \
          --password-stdin
    - |
      for pkg in dist/*.tgz; do
        echo "Pushing $pkg -> oci://${CI_REGISTRY_IMAGE}/helm-charts"
        helm push "$pkg" "oci://${CI_REGISTRY_IMAGE}/helm-charts"
      done
  artifacts:
    paths:
      - dist/*.tgz
    expire_in: 1 week
